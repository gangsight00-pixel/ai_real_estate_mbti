/* ============================================================
   추천 경매 검색조건 — 04_search_criteria.json (v1.0) 규칙의 JS 재현
   검색조건 = f(유형 축, profile 입력값). 결정적 매핑.
   ============================================================ */
function scFmtKRW(won){
  if(won==null) return '하한 없음';
  var eok=Math.floor(won/100000000);
  var man=Math.round((won%100000000)/10000);
  var s='';
  if(eok>0) s+=eok+'억';
  if(man>0) s+=(eok>0?' ':'')+man.toLocaleString()+'만';
  if(!s) s='0';
  return s+'원';
}
var SC_SIDO=['','서울특별시','부산광역시','대구광역시','인천광역시','광주광역시','대전광역시','울산광역시','세종특별자치시','경기도','강원특별자치도','충청북도','충청남도','전북특별자치도','전라남도','경상북도','경상남도','제주특별자치도'];

function computeSearchCriteria(r, sido, sigungu){
  var poles=r.poles||{}, pv=r.profileValues||{};
  var fund=pv.fund_size, own=pv.ownership||'none', reg=pv.region_regulated||'normal';
  var purpose=pv.purpose, exp=pv.experience, pref=pv.region_pref;
  var FUND=poles.FUND, DIFF=poles.DIFFICULTY, REGION=poles.REGION, PURP=poles.PURPOSE;
  var isFlip=(PURP==='f')||(purpose==='flip');
  var isSmall=fund?(fund==='u50'||fund==='u150'):(FUND==='s');
  var isBig=fund?(fund==='u300'||fund==='o300'):(FUND==='b');

  // --- price: equity_top × LTV배수 × 보수계수 (00_regulations.md 근거) ---
  var EQ={u50:50000000,u150:150000000,u300:300000000,o300:400000000};
  var equity=(fund&&EQ[fund]!=null)?EQ[fund]:(FUND==='b'?300000000:50000000);
  function ltvMult(regKey){ // 1/(1-LTV)
    if(regKey==='regulated') return (own==='none')?1.67:1.0; // 무주택 LTV40 / 1주택·다주택 LTV0
    return 3.33; // 비규제 LTV70
  }
  var fundSafety=(FUND==='b')?1.0:0.9;
  var multiNormalSafety=(own==='multi'&&reg==='normal')?0.7:1.0;
  function pmax(regKey){ return Math.round(equity*ltvMult(regKey)*fundSafety*multiNormalSafety/1000000)*1000000; }
  var priceMax, priceMaxAlt=null, priceMaxAltLabel='';
  if(reg==='unknown'){
    var low=pmax('regulated'), high=pmax('normal');
    priceMax=high; priceMaxAlt=low; priceMaxAltLabel='규제지역이면 보수적으로 '+scFmtKRW(low)+'까지 낮춰 산정';
  } else {
    priceMax=pmax(reg);
    if(reg==='regulated'&&own==='none'){ // 생애최초 LTV70 분기
      priceMaxAlt=Math.round(equity*3.33*fundSafety/1000000)*1000000;
      priceMaxAltLabel='생애최초 LTV 70% 인정 시 ~'+scFmtKRW(priceMaxAlt)+'까지 확대 가능';
    }
  }
  var priceMin=isSmall?30000000:null;

  // --- property_type: base_by_purpose → fund_modifier ---
  var base=(purpose==='rent')?['아파트','오피스텔','다세대주택']:(purpose==='flip')?['아파트','오피스텔']:['아파트'];
  var ptypes;
  if(isBig){ ptypes=['아파트']; if(purpose==='rent') ptypes.push('오피스텔'); }
  else { ptypes=base.slice(); if(isSmall) ['다세대주택','연립주택','오피스텔','도시형생활주택'].forEach(function(t){ if(ptypes.indexOf(t)<0) ptypes.push(t); }); }

  // --- regulated_preference ---
  var regPref;
  if(own==='multi') regPref='비규제선호(강)';
  else if(own==='one') regPref='비규제권장';
  else regPref=(purpose==='flip')?'비규제선호':(purpose==='rent')?'규제무관~비규제선호':'규제무관(실수요면 규제지역도 적합·기회)';

  // --- min_fail_count ---
  var mf=(DIFF==='x')?2:1;
  if(isFlip) mf+=1;
  if(reg==='regulated') mf+=1;
  if(FUND==='b'&&DIFF==='c') mf-=1;
  if(mf<0) mf=0;

  // --- rights_difficulty (experience override) ---
  var rights=(DIFF==='x')?'special_ok':'safe', rightsNote='', specialConds=[];
  if(rights==='safe'){ rightsNote='말소기준권리 이하 전부 소멸·인수권리 0·대항력 없는 점유(인도명령 가능). 특수조건 미체크.'; }
  else {
    specialConds=['유치권','법정지상권','분묘기지권','지분매각','대지권미등기','선순위(대항력)임차인'];
    rightsNote='유치권·법정지상권·지분·선순위임차인 등 허용. courtauction 특수조건 체크.';
    if(exp==='novice'){ rights='safe'; specialConds=[]; rightsNote='⚠ 초보+특수물건은 위험 → 안전(safe)으로 강등 권고. 첫 5건은 권리 단순 물건으로. (원 성향: special_ok)'; }
    else if(exp==='inter'){ rightsNote='쟁점 1~2개 물건까지 제한 권고. '+rightsNote; }
  }

  // --- area_pyeong ---
  var area, areaMin=null, areaMax=null;
  if(purpose==='rent'){ area='소형 임대형(전용 ~59㎡)·오피스텔'; areaMax=59; }
  else if(isSmall){ area='전용 ~59㎡ 소형'; areaMax=59; }
  else { area='국민평형(전용 59~84㎡)'; areaMin=59; areaMax=84; }

  // --- region ---
  var rscope, rsite, raxis;
  if(pref==='nation'){ rscope='전국 (수익률 상위 복수 시·군·구 순회)'; rsite='시도 무제한'; raxis=(REGION==='w')?'w':'n'; }
  else if(pref==='metro'){ rscope='수도권 (서울·경기·인천)'; rsite='시도=서울/경기/인천'; raxis='w(약)'; }
  else { rscope='연고 시·군·구 1~2곳'; rsite='시도+시군구 직접 지정'; raxis='n'; }
  var regionStr;
  if(sido&&sigungu) regionStr=sido+' '+sigungu;
  else if(sido) regionStr=sido+' (시·군·구 미지정)';
  else regionStr=rscope;
  var regSuffix='';
  if(own==='multi'||own==='one') regSuffix=' · 비규제 지역 우선';
  else if(isSmall&&reg!=='regulated') regSuffix=' · 자금 고려 시 비규제 현실적';

  // --- notes (flags 메시지 골격 + price/세금/명도/면책) ---
  var notes=[];
  if(reg==='regulated'&&own==='none') notes.push('규제지역 무주택 경락대출 LTV 40%(×1.67)·6개월 전입의무 전제로 산정. 생애최초면 LTV 70%(×3.33)로 '+scFmtKRW(priceMaxAlt)+'까지 확대 가능 — 대출 조건과 실거주 요건은 분리해 확인.');
  else if(reg==='regulated'&&(own==='one'||own==='multi')) notes.push('규제지역 '+(own==='multi'?'다주택':'1주택 미처분 추가구입')+'은 경락잔금대출에도 주담대 금지(LTV 0%)가 적용될 수 있어 전액 자기자본 전제로 입찰가를 산정했습니다. (금융사별 경락대출 취급기준 확인 필요)');
  else if(reg==='unknown') notes.push('규제 여부 미상 → price_max를 규제(보수 '+scFmtKRW(priceMaxAlt)+')~비규제(확대 '+scFmtKRW(priceMax)+') 범위로 제시. 입찰 전 국토부 「조정대상지역·투기과열지구 지정」 페이지에서 규제 여부를 먼저 확인하세요.');
  else notes.push('비규제 LTV 70%(×3.33) 가정. price_max는 대출 최대·DSR 40% 충족 가정의 검색 상한이며, 경락잔금대출 가용액은 금융사·소득별로 상이하니 보수적으로 잡고 DSR을 확인하세요.');
  if(own==='multi'&&reg==='normal') notes.push('비규제라도 다주택은 수도권 주담대 6억 한도·추가구입 제약·DSR 불확실로 ×0.7 추가 보수를 적용했습니다.');
  if(reg==='regulated') notes.push('규제지역 경매의 양면 — (기회) 토지거래허가 2년 실거주의무·자금조달계획서 면제 / (함정) 그 쏠림으로 고가낙찰 빈발 + 대출규제(LTV·DSR)는 동일. price_max는 검색 상한일 뿐, 낙찰가는 시세 역산 상한을 절대 넘기지 마세요.');
  if(own==='multi'&&isFlip) notes.push('다주택 단기매각: 양도세 단기중과(1년 미만 70%·2년 미만 60% 등) + 조정지역 +20~30%p 중과(유예 종료 여부 확인) + 취득세 8~12% 중과 → 세후 마진이 거의 없을 수 있으니 세후 취득원가로 재계산.');
  else if(own==='multi') notes.push('다주택 추가취득: 취득세 8~12% 중과 + 종부세 합산 → "싸게 낙찰"의 메리트가 상쇄될 수 있으니 세후 취득원가로 재계산.');
  else if(own==='none'&&purpose==='reside') notes.push('무주택 실거주: 생애최초 취득세 감면·디딤돌/보금자리 대출 우대 대상일 수 있습니다.');
  if(rights==='special_ok') notes.push('특수물건은 명도·소송 예비비와 기간 버퍼가 필수입니다. 최악 시나리오(소송 장기화) 기준으로 입찰가를 설계하세요.');
  else notes.push('인도명령 가능 점유로 한정하고, 등기부·매각물건명세서·현황조사서 3종으로 인수권리 0을 확인하세요.');
  if(DIFF==='x'&&exp==='novice') notes.push('초보가 특수물건에 들어가면 권리분석 실패·명도 분쟁 위험이 매우 큽니다 — 안전물건으로 첫 5건 경험을 쌓길 권합니다.');
  if(exp==='novice') notes.push('초보의 진짜 위험은 권리가 아니라 고가낙찰입니다. 최근 실거래·급매가에서 역산한 입찰 상한선을 절대 넘기지 마세요(패찰을 두려워 말 것).');
  notes.push('본 검색조건은 투자성향 기반 참고용 가이드일 뿐 투자·세무·법률 자문이 아닙니다. 실제 입찰 전 권리분석·시세·대출(경락잔금대출 가용액·DSR)을 직접 확인하세요. 규제 수치는 00_regulations.md(2026-07-01) 기준이며 정책은 수시 변경됩니다.');

  return {
    region:{ str:regionStr+regSuffix, sido:sido||null, sigungu:sigungu||null, scope:rscope, site:rsite, axis_consistency:raxis },
    regulated_preference:regPref,
    property_type:ptypes,
    price_min:priceMin,
    price_max:priceMax, price_max_alt:priceMaxAlt, price_max_alt_label:priceMaxAltLabel,
    min_fail_count:mf,
    rights_difficulty:rights, rights_note:rightsNote, special_conditions:specialConds,
    area_pyeong:area, area_min_m2:areaMin, area_max_m2:areaMax,
    notes:notes
  };
}

function searchCriteriaJSON(r, sc){
  return {
    _meta:{
      schema:'04_search_criteria.json', schema_version:'1.0', track:'gyeongmae',
      type_code:r.code, generated_at:new Date().toISOString(), source:'부동산투자성향테스트.html',
      region_struct:{ sido:sc.region.sido, sigungu:sc.region.sigungu, scope:sc.region.scope, axis_consistency:sc.region.axis_consistency },
      site_special_conditions:sc.special_conditions,
      area_m2:{ min:sc.area_min_m2, max:sc.area_max_m2 },
      price_max_alt:sc.price_max_alt, price_max_alt_label:sc.price_max_alt_label||null,
      disclaimer:'투자성향 기반 참고용 — 투자·세무·법률 자문 아님. 규제수치 00_regulations.md(2026-07-01) 기준. 실제 입찰 전 권리분석·시세·대출 직접 확인.'
    },
    region:sc.region.str,
    regulated_preference:sc.regulated_preference,
    property_type:sc.property_type,
    price_min:sc.price_min,
    price_max:sc.price_max,
    min_fail_count:sc.min_fail_count,
    rights_difficulty:sc.rights_difficulty,
    area_pyeong:sc.area_pyeong,
    notes:sc.notes
  };
}

function searchCardShell(){
  var opts=SC_SIDO.map(function(s){ return '<option value="'+s+'">'+(s||'시/도 선택')+'</option>'; }).join('');
  return '<div class="sc-card">'
   +'<div class="sc-head"><span style="font-size:1.3rem"></span><h4>내 조건으로 먼저 볼 검색 기준</h4></div>'
    +'<p class="sc-intro">아래 내용은 경매 사이트에서 물건을 찾기 전에 참고할 조건입니다. 개발자용 데이터는 숨기고, 사람이 읽기 쉬운 기준만 보여드립니다.</p>'
   +'<div class="sc-region-input">'
     +'<label>관심 지역을 조금 더 좁혀볼까요? 선택 사항입니다.</label>'
     +'<div class="row"><select id="sc-sido">'+opts+'</select><input id="sc-sigungu" type="text" placeholder="예: 수원시 영통구 / 부천시 / 동탄"></div>'
     +'<div class="hint">비워두면 테스트 결과에 맞춰 넓은 범위로 안내합니다.</div>'
   +'</div>'
   +'<div class="sc-dims" id="sc-dims"></div>'
   +'<div class="sc-notes" id="sc-notes"></div>'
   +'<div class="sc-export"><textarea class="sc-json" id="sc-json" readonly spellcheck="false"></textarea></div>'
  +'</div>';
}

var _scR=null;
function initSearchCard(r){
  _scR=r;
  if($('sc-code')) $('sc-code').textContent=r.code;
  if($('sc-sido')) $('sc-sido').onchange=updateSearchCard;
  if($('sc-sigungu')) $('sc-sigungu').oninput=updateSearchCard;
  if($('sc-copy')) $('sc-copy').onclick=function(){
    var txt=$('sc-json').value;
    if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(function(){toast('검색조건 JSON이 복사됐어요');}).catch(function(){ $('sc-json').select(); toast('JSON 영역을 직접 복사하세요'); });
    else { $('sc-json').select(); try{document.execCommand('copy');toast('검색조건 JSON이 복사됐어요');}catch(e){toast('JSON 영역을 직접 복사하세요');} }
  };
  if($('sc-download')) $('sc-download').onclick=function(){
    var blob=new Blob([$('sc-json').value],{type:'application/json'});
    var url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='auction_search_'+_scR.code+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    toast('검색조건 JSON 파일을 내려받았어요');
  };
  updateSearchCard();
}
function scDim(label, siteOn, valueHtml, sub, full){
  var badge=siteOn?'<span class="site">필터 O</span>':'<span class="site nosite">참고</span>';
  return '<div class="sc-dim'+(full?' full':'')+'"><div class="dk">'+esc(label)+' '+badge+'</div><div class="dv">'+valueHtml+'</div>'+(sub?'<div class="dsub">'+sub+'</div>':'')+'</div>';
}
function updateSearchCard(){
  if(!_scR) return;
  var sidoEl=$('sc-sido'), sgEl=$('sc-sigungu');
  var sido=sidoEl?sidoEl.value:''; var sigungu=sgEl?(sgEl.value||'').trim():'';
  var sc=computeSearchCriteria(_scR, sido, sigungu);
  var dh='';
  dh+=scDim('지역 region', true, esc(sc.region.str), '범위: '+esc(sc.region.scope)+' · 사이트: '+esc(sc.region.site)+' (REGION='+esc(sc.region.axis_consistency)+')');
  dh+=scDim('규제 선호 regulated_preference', false, esc(sc.regulated_preference), 'courtauction에 규제지역 필터 없음 → region·notes로 안내');
  dh+=scDim('물건종류 property_type', true, sc.property_type.map(function(t){return '<span class="sc-tag">'+esc(t)+'</span>';}).join(''), null, true);
  dh+=scDim('최저가 하한 price_min', true, sc.price_min!=null?esc(scFmtKRW(sc.price_min)):'하한 없음', sc.price_min!=null?'소액 — 저가 권리·환금 불량 회피용 하한':'대액 — 우량 집중, 하한 없음');
  dh+=scDim('최저가 상한 price_max', true, esc(scFmtKRW(sc.price_max)), sc.price_max_alt_label?esc(sc.price_max_alt_label):'자기자본 밴드 상단 × LTV배수 × 보수계수');
  dh+=scDim('유찰 회수 min_fail_count', true, '≥ '+sc.min_fail_count+'회', '1회 유찰 시 통상 최저가 20~30%↓(법원별 상이)');
  var rv=sc.rights_difficulty==='safe'?'안전 (safe)':'특수 허용 (special_ok)';
  dh+=scDim('권리 난이도 rights_difficulty', true, esc(rv), esc(sc.rights_note)+(sc.special_conditions.length?' · 체크: '+sc.special_conditions.map(esc).join(', '):''), true);
  dh+=scDim('전용면적 area_pyeong', true, esc(sc.area_pyeong), '사이트: 전용면적 범위(㎡)로 필터');
  $('sc-dims').innerHTML=dh;
  $('sc-notes').innerHTML='<div class="sc-dim full"><div class="dk">메모 notes <span class="site nosite">참고</span></div><ul>'+sc.notes.map(function(n){return '<li>'+inlineFmt(n)+'</li>';}).join('')+'</ul></div>';
  $('sc-json').value=JSON.stringify(searchCriteriaJSON(_scR, sc), null, 2);
}
function conditionText(data, pv){
  const parts=[];
  (data.profile_inputs||[]).forEach(inp=>{
    if(pv[inp.id]!==undefined){
      const opt=inp.options.find(o=>o.value===pv[inp.id]);
      if(opt) parts.push(inp.label+': '+opt.label);
    }
  });
  return '<b>입력한 조건</b> · '+parts.join('  ·  ');
}
function restart(){
  state={ track:null, steps:[], stepIndex:0, answers:{}, profile:{} };
  history.replaceState(null,'',location.pathname);
  $('progress').style.width='0%';
  $('start-btn').disabled=true; $('start-btn').textContent='먼저 끌리는 쪽을 골라주세요';
  document.querySelectorAll('.track-card').forEach(c=>c.classList.remove('sel'));
  show('screen-start');
}

/* ---------- save / share via URL ---------- */
function saveToURL(track, r){
  const payload={ t:track, p:r.profileValues||{}, a:answerCodes() };
  history.replaceState(null,'',location.pathname);
  try{ localStorage.setItem('rmbti_last', JSON.stringify(payload)); }catch(e){}
}
function answerCodes(){
  // store selected option indexes to allow full re-score on reload
  const out={};
  for(const k in state.answers) out['q:'+k]=state.answers[k].__i;
  for(const k in state.profile) out['p:'+k]=state.profile[k].__i;
  return out;
}
function copyShare(){
  const pageUrl='https://ai-real-estate-mbti.vercel.app/';
  const url=pageUrl;
  const title='내 부동산 투자 성향 테스트 결과';
  const text='내 조건에 맞는 부동산 투자 성향 결과를 확인해보세요.';
  const fallback=()=>{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(()=>toast('공유 링크가 복사됐어요')).catch(()=>toast('공유 링크: '+url));
    } else {
      toast('공유 링크: '+url);
    }
  };
  if(navigator.share){
    try{
      navigator.share({title:title, text:text, url:url}).then(()=>toast('공유창을 열었어요')).catch(fallback);
    }catch(e){ fallback(); }
    return;
  }
  fallback();
}
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- restore from URL ---------- */
function tryRestore(){
  const params=new URLSearchParams(location.search);
  let payload=null;
  if(params.get('r')){
    try{ payload=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(params.get('r')))))); }catch(e){ payload=null; }
  }
  if(!payload){ try{ const ls=localStorage.getItem('rmbti_last'); /* do not auto-load LS, only URL */ }catch(e){} }
  if(payload && DATA[payload.t]){
    const data=DATA[payload.t];
    state.track=payload.t; state.answers={}; state.profile={};
    const codes=payload.a||{};
    data.questions.forEach(q=>{ const ix=codes['q:'+q.id]; if(ix!=null && q.options[ix]) state.answers[q.id]=Object.assign({__i:ix},q.options[ix]); });
    (data.profile_inputs||[]).forEach(p=>{ const ix=codes['p:'+p.id]; if(ix!=null && p.options[ix]) state.profile[p.id]=Object.assign({__i:ix},p.options[ix]); });
    const r=scoreTrack(data, state.answers, state.profile);
    renderResult(payload.t, r);
    show('screen-result');
    return true;
  }
  return false;
}

/* ---------- init ---------- */
renderStart();
if(!tryRestore()){ show('screen-start'); }
</script>
