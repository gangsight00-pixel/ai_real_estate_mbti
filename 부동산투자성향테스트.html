<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부동산 투자성향 테스트 · 매매 / 경매</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='6' x2='56' y2='60'%3E%3Cstop stop-color='%2300D6FF'/%3E%3Cstop offset='.52' stop-color='%23244BFF'/%3E%3Cstop offset='1' stop-color='%23070914'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Cpath d='M18 40V25l14-9 14 9v15' fill='none' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M24 42h16M25 33h14' stroke='white' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='48' cy='18' r='4' fill='%23FF8A1D'/%3E%3C/svg%3E">
<style>
:root{
  --dark:#141413; --light:#faf9f5; --light-gray:#e8e6dc; --mid-gray:#b0aea5;
  --orange:#d97757; --blue:#6a9bcc; --green:#788c5d;
  --mute:rgba(20,20,19,0.62); --on-dark-mute:rgba(250,249,245,0.6);
  --line:rgba(20,20,19,0.1);
  --heading:Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; --body:Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; --label:Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  --maxw:880px; --ease:cubic-bezier(.16,1,.3,1);
}
*{ box-sizing:border-box; }
body{ margin:0; background:var(--light); color:var(--dark); font-family:var(--body); -webkit-font-smoothing:antialiased; line-height:1.6; }
h1,h2,h3,h4{ margin:0; font-family:var(--heading); font-weight:600; letter-spacing:-0.01em; }
a{ color:var(--orange); }
::selection{ background:var(--orange); color:var(--light); }
:focus-visible{ outline:2px solid var(--orange); outline-offset:3px; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:0 24px; }

/* progress */
.progress{ position:fixed; top:0; left:0; height:3px; width:0%; background:linear-gradient(90deg,var(--orange),var(--blue)); z-index:100; transition:width 0.35s var(--ease); }

/* eyebrow */
.eyebrow{ font-family:var(--label); font-size:0.72rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--mute); display:inline-flex; align-items:center; gap:0.5em; background:var(--light-gray); padding:6px 14px; border-radius:999px; }
.eyebrow::before{ content:''; width:6px; height:6px; background:var(--orange); border-radius:50%; display:inline-block; }

/* screens */
.screen{ display:none; min-height:100vh; padding:64px 0 96px; }
.screen.active{ display:block; animation:fade 0.5s var(--ease); }
@keyframes fade{ from{ opacity:0; transform:translateY(12px);} to{ opacity:1; transform:translateY(0);} }

/* ---- start hero ---- */
.hero{ position:relative; text-align:center; overflow:hidden; }
.blob{ position:absolute; border-radius:50%; filter:blur(60px); pointer-events:none; opacity:0.5; z-index:0; }
.blob.b1{ width:340px; height:340px; background:var(--orange); top:-60px; left:8%; animation:driftA 16s var(--ease) infinite; }
.blob.b2{ width:300px; height:300px; background:var(--blue); top:10px; right:6%; animation:driftB 19s var(--ease) infinite; }
.blob.b3{ width:240px; height:240px; background:var(--green); top:120px; left:40%; animation:driftC 22s var(--ease) infinite; }
@keyframes driftA{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(40px,30px) scale(1.12);} }
@keyframes driftB{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(-36px,24px) scale(1.08);} }
@keyframes driftC{ 0%,100%{ transform:translate(0,0) scale(1);} 50%{ transform:translate(20px,-26px) scale(1.1);} }
.hero .inner{ position:relative; z-index:1; }
.hero h1{ font-size:clamp(2.1rem,5vw,3.2rem); line-height:1.12; margin:18px 0 14px; }
.hero h1 em{ color:var(--orange); font-family:var(--heading); font-weight:700; font-style:normal; }
.lead{ font-size:1.08rem; color:var(--mute); max-width:560px; margin:0 auto 8px;  }

/* track cards */
.track-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin:40px 0 26px; }
.track-card{ text-align:left; background:var(--light); border:2px solid var(--line); border-radius:20px; padding:26px 24px; cursor:pointer; transition:transform 0.3s var(--ease), box-shadow 0.3s ease, border-color 0.3s ease; }
.track-card:hover{ transform:translateY(-4px); box-shadow:0 18px 36px -18px rgba(20,20,19,0.22); border-color:rgba(217,119,87,0.4); }
.track-card.sel{ border-color:var(--orange); box-shadow:0 18px 36px -18px rgba(217,119,87,0.4); }
.track-card .ico{ width:86px; height:86px; border-radius:24px; display:grid; place-items:center; margin-bottom:22px; background:linear-gradient(145deg,#244bff,#071022); box-shadow:0 20px 40px -24px rgba(36,75,255,.85); }
.track-card .ico svg{ width:54px; height:54px; display:block; }
.track-card .ico .accent{ fill:#ff8a1d; }
.track-card h3{ font-size:1.25rem; margin:10px 0 6px; }
.track-card p{ margin:0; color:var(--mute); font-size:0.95rem; }
.track-card .axes{ margin-top:14px; display:flex; flex-wrap:wrap; gap:6px; }
.miniaxis{ font-family:var(--label); font-size:0.66rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--mute); background:var(--light-gray); padding:5px 10px; border-radius:999px; }

/* buttons */
.btn{ font-family:var(--label); font-weight:600; font-size:0.95rem; border:none; border-radius:999px; padding:14px 30px; cursor:pointer; transition:all 0.25s var(--ease); }
.btn-primary{ background:var(--dark); color:var(--light); }
.btn-primary:hover{ background:var(--orange); transform:translateY(-2px); }
.btn-primary:disabled{ background:var(--mid-gray); cursor:not-allowed; transform:none; opacity:0.6; }
.btn-ghost{ background:transparent; color:var(--dark); border:1.5px solid var(--line); }
.btn-ghost:hover{ border-color:var(--orange); color:var(--orange); }
.btn-row{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.note{ font-size:0.84rem; color:var(--mute); margin-top:18px; }

@media (max-width:640px){
  .screen{ min-height:auto; padding:26px 0 44px; }
  .wrap{ padding:0 16px; }
  .hero h1{ margin:12px 0 10px; font-size:2rem; }
  .lead{ font-size:.95rem; line-height:1.55; }
  .track-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; margin:28px 0 22px; }
  .track-card{ padding:18px 14px; border-radius:16px; }
  .track-card .ico{ width:56px; height:56px; border-radius:16px; margin-bottom:14px; }
  .track-card .ico svg{ width:34px; height:34px; }
  .track-card h3{ font-size:1rem; line-height:1.32; margin:8px 0 6px; }
  .track-card p{ font-size:.78rem; line-height:1.5; }
  .quiz-top{ margin-bottom:4px; }
  .bar{ height:5px; margin-bottom:18px; }
  .qkind{ margin-bottom:10px; }
  .qtext{ font-size:1.22rem; line-height:1.32; margin-bottom:6px; }
  .qsub{ font-size:.84rem; margin-bottom:14px; }
  .opts{ gap:8px; }
  .opt{ padding:13px 14px; border-radius:12px; font-size:.94rem; line-height:1.38; gap:10px; }
  .opt .mark{ width:18px; height:18px; }
  .opt.sel .mark::after{ inset:4px; }
  .nav-row{ margin-top:18px; }
  .result-type{ word-break:keep-all; overflow-wrap:normal; line-break:strict; text-wrap:balance; font-size:1.9rem; }
  .btn-row{ flex-wrap:nowrap; gap:8px; }
  .btn-row .btn{ flex:1 1 0; min-width:0; padding:13px 8px; font-size:.88rem; white-space:nowrap; }
}

/* ---- quiz ---- */
.quiz-top{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:8px; }
.qtrack{ font-family:var(--label); font-size:0.74rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--orange); }
.qcount{ font-family:var(--label); font-size:0.8rem; color:var(--mute); }
.bar{ height:6px; background:var(--light-gray); border-radius:999px; overflow:hidden; margin-bottom:34px; }
.bar > span{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--orange),var(--blue)); border-radius:999px; transition:width 0.4s var(--ease); }
.qkind{ display:inline-flex; align-items:center; gap:7px; margin-bottom:16px; }
.qkind .dot{ width:7px; height:7px; border-radius:50%; background:var(--green); }
.qkind .dot.profile{ background:var(--blue); }
.qkind span{ font-family:var(--label); font-size:0.7rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--mute); }
.qtext{ font-family:var(--heading); font-weight:600; font-size:1.5rem; line-height:1.35; margin-bottom:8px; }
.qsub{ color:var(--mute); font-size:0.95rem; margin-bottom:26px;  }
.opts{ display:flex; flex-direction:column; gap:12px; }
.opt{ text-align:left; background:var(--light); border:1.5px solid var(--line); border-radius:14px; padding:18px 20px; cursor:pointer; font-family:var(--body); font-size:1.02rem; color:var(--dark); transition:all 0.22s var(--ease); display:flex; align-items:center; gap:14px; }
.opt:hover{ border-color:rgba(217,119,87,0.45); transform:translateX(3px); }
.opt.sel{ border-color:var(--orange); background:#fdf3ee; box-shadow:0 8px 20px -12px rgba(217,119,87,0.45); }
.opt .mark{ flex:none; width:22px; height:22px; border-radius:50%; border:2px solid var(--mid-gray); transition:all 0.2s; position:relative; }
.opt.sel .mark{ border-color:var(--orange); background:var(--orange); }
.opt.sel .mark::after{ content:''; position:absolute; inset:5px; background:var(--light); border-radius:50%; }
.nav-row{ display:flex; justify-content:space-between; margin-top:34px; gap:12px; }

/* ---- result ---- */
.rhead{ text-align:center; position:relative; padding:14px 0 8px; }
.rcode{ font-family:var(--heading); font-weight:700; font-size:clamp(2.4rem,7vw,3.6rem); letter-spacing:0.02em; background:linear-gradient(120deg,var(--orange),var(--green),var(--blue)); -webkit-background-clip:text; background-clip:text; color:transparent; }
.rname{ font-size:1.5rem; margin-top:6px; }
.rsummary{ color:var(--mute); max-width:600px; margin:14px auto 0;  font-size:1.05rem; }
.chips{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:20px 0 6px; }
.kchip{ font-family:var(--label); font-size:0.74rem; font-weight:600; letter-spacing:0.04em; background:var(--light-gray); color:var(--dark); padding:7px 14px; border-radius:999px; }
.rare-pill{ display:inline-block; margin-top:12px; font-family:var(--label); font-size:0.66rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; background:var(--orange); color:var(--light); padding:5px 12px; border-radius:999px; }

.axisrow{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:30px 0; }
@media (max-width:640px){ .axisrow{ grid-template-columns:repeat(2,1fr); } }
.axisbox{ background:var(--light); border:1px solid var(--line); border-radius:14px; padding:14px 12px; text-align:center; }
.axisbox .al{ font-family:var(--label); font-size:0.62rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--mute); }
.axisbox .av{ font-family:var(--heading); font-weight:600; font-size:1.02rem; margin-top:6px; }
.axisbox .ac{ display:inline-block; font-family:var(--heading); font-weight:700; color:var(--orange); margin-right:5px; }
.axisbox.bl{ border-color:rgba(217,119,87,0.5); background:#fdf3ee; }
.axisbox .blnote{ font-size:0.62rem; color:var(--orange); margin-top:5px; font-family:var(--label); font-weight:600; }

.sec{ margin:26px 0; }
.sec-title{ font-family:var(--label); font-size:0.74rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; color:var(--mute); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.sec-title::before{ content:''; width:18px; height:2px; background:var(--orange); }

.swb{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media (max-width:640px){ .swb{ grid-template-columns:1fr; } }
.panel{ border:1px solid var(--line); border-radius:16px; padding:20px 20px; background:var(--light); }
.panel h4{ font-size:0.96rem; margin-bottom:10px; display:flex; align-items:center; gap:7px; }
.panel.strength{ border-top:3px solid var(--green); }
.panel.weakness{ border-top:3px solid var(--orange); }
.panel.blind{ grid-column:1/-1; border-top:3px solid #c2543a; background:#fdf3ee; }
.panel ul{ margin:0; padding-left:18px; }
.panel li{ margin-bottom:7px; }
.panel p{ margin:0 0 8px; }
.panel.identity{ background:var(--dark); color:var(--light); border:none; }
.panel.identity p{  font-size:1.04rem; line-height:1.65; margin:0; }

.guide-item{ border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin-bottom:12px; background:var(--light); }
.guide-item h4{ font-size:0.95rem; margin-bottom:10px; color:var(--orange); }
.guide-item ul,.guide-item ol{ margin:0; padding-left:20px; }
.guide-item li{ margin-bottom:6px; }
.guide-item p{ margin:0 0 8px; }
.guide-item strong{ color:var(--dark); }

.flag{ border-radius:14px; padding:16px 18px; margin-bottom:12px; border:1px solid; display:flex; gap:12px; align-items:flex-start; }
.flag .fi{ font-size:1.15rem; flex:none; line-height:1.4; }
.flag .ft{ font-family:var(--label); font-size:0.64rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; display:inline-block; padding:3px 9px; border-radius:999px; margin-bottom:7px; }
.flag .fm{ font-size:0.96rem; line-height:1.6; }
.flag.danger{ background:#fbecec; border-color:#d98a8a; }
.flag.danger .ft{ background:#c2543a; color:#fff; }
.flag.warn{ background:#fdf3ee; border-color:rgba(217,119,87,0.5); }
.flag.warn .ft{ background:var(--orange); color:#fff; }
.flag.info{ background:#eef3f8; border-color:rgba(106,155,204,0.5); }
.flag.info .ft{ background:var(--blue); color:#fff; }

.cond-line{ background:var(--light-gray); border-radius:12px; padding:12px 16px; font-size:0.9rem; color:var(--mute); margin-bottom:22px; }
.cond-line b{ color:var(--dark); font-family:var(--label); font-weight:600; }
.reg-note{ background:#eef3f8; border:1px solid rgba(106,155,204,0.45); border-radius:12px; padding:11px 15px; font-size:0.88rem; line-height:1.55; color:var(--dark); margin-bottom:14px; }
.reg-note b{ color:var(--blue); }
.flag-foot{ font-size:0.8rem; color:var(--mute); line-height:1.55; margin-top:12px; }
.flag-foot code{ background:var(--light-gray); padding:1px 5px; border-radius:5px; font-size:0.86em; }
.flag-foot b{ color:#c2543a; }
details.reg{ background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
details.reg>summary{ cursor:pointer; list-style:none; padding:16px 18px; font-family:var(--label); font-weight:600; font-size:0.92rem; color:var(--dark); background:var(--light-gray); display:flex; align-items:center; gap:8px; }
details.reg>summary::-webkit-details-marker{ display:none; }
details.reg>summary::after{ content:'▸'; margin-left:auto; color:var(--mute); transition:transform .2s; }
details.reg[open]>summary::after{ transform:rotate(90deg); }
.reg-body{ padding:18px 20px 22px; }
.reg-body h5{ font-family:var(--label); font-size:0.82rem; letter-spacing:0.03em; color:var(--orange); margin:20px 0 8px; padding-top:14px; border-top:1px dashed var(--line); }
.reg-body h5:first-of-type{ border-top:none; padding-top:0; }
.reg-body ul{ margin:6px 0 6px 2px; padding-left:18px; }
.reg-body li{ font-size:0.88rem; line-height:1.62; margin-bottom:7px; }
.reg-body .rt{ font-size:0.86rem; line-height:1.55; color:var(--mute); margin:4px 0 8px; }
.reg-body .reg-src{ font-size:0.84rem; line-height:1.6; color:var(--mute); background:var(--light-gray); border-radius:10px; padding:11px 14px; margin-bottom:6px; }
.reg-body code{ background:var(--light-gray); padding:1px 5px; border-radius:5px; font-size:0.86em; }
.reg-body .reg-disc{ font-size:0.85rem; line-height:1.6; color:var(--dark); background:#fdf3ee; border:1px solid rgba(217,119,87,0.4); border-radius:11px; padding:12px 15px; margin-top:12px; }
.rtbl{ overflow-x:auto; margin:8px 0; }
.rtbl table{ width:100%; border-collapse:collapse; font-size:0.82rem; }
.rtbl th,.rtbl td{ border:1px solid var(--line); padding:7px 9px; text-align:left; line-height:1.45; vertical-align:top; }
.rtbl th{ background:var(--light-gray); font-family:var(--label); font-weight:600; }
.rb{ display:inline-block; font-size:0.7rem; font-weight:600; padding:1px 6px; border-radius:6px; vertical-align:middle; white-space:nowrap; }
.rb.ok{ background:#e7f1ea; color:#3f7d55; }
.rb.unsure{ background:#fbecec; color:#c2543a; }
.rb.gazette{ background:#e4eef7; color:#2f6296; border:1px solid rgba(47,98,150,0.35); }

footer{ text-align:center; color:var(--mute); font-size:0.82rem; padding:30px 0 50px; }
.disclaimer{ max-width:620px; margin:36px auto 0; font-size:0.84rem; color:var(--mute); text-align:center; line-height:1.6; border-top:1px solid var(--line); padding-top:22px; }
.toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--dark); color:var(--light); padding:13px 22px; border-radius:999px; font-family:var(--label); font-size:0.85rem; font-weight:500; opacity:0; pointer-events:none; transition:all 0.35s var(--ease); z-index:200; }
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* ---- 추천 경매 검색조건 카드 (경매 트랙 전용) ---- */
.sc-card{ border:1px solid var(--line); border-radius:18px; background:#fff; padding:24px 22px; }
.sc-head{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.sc-head h4{ font-size:1.12rem; }
.sc-intro{ color:var(--mute); font-size:0.9rem; margin:0 0 18px; line-height:1.55; }
.sc-intro b{ color:var(--dark); }
.sc-region-input{ background:var(--light-gray); border-radius:12px; padding:14px 16px; margin-bottom:18px; }
.sc-region-input label{ font-family:var(--label); font-size:0.7rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; color:var(--mute); display:block; margin-bottom:9px; }
.sc-region-input .row{ display:flex; gap:10px; flex-wrap:wrap; }
.sc-region-input select,.sc-region-input input{ font-family:var(--body); font-size:0.95rem; padding:10px 12px; border:1.5px solid var(--line); border-radius:10px; background:#fff; color:var(--dark); }
.sc-region-input select{ min-width:150px; }
.sc-region-input input{ flex:1; min-width:170px; }
.sc-region-input .hint{ font-size:0.79rem; color:var(--mute); margin-top:9px; line-height:1.5; }
.sc-dims{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media (max-width:640px){ .sc-dims{ grid-template-columns:1fr; } }
.sc-dim{ border:1px solid var(--line); border-radius:13px; padding:13px 15px; background:var(--light); }
.sc-dim.full{ grid-column:1/-1; }
.sc-dim .dk{ font-family:var(--label); font-size:0.63rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--mute); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.sc-dim .dk .site{ font-size:0.58rem; padding:1px 7px; border-radius:6px; background:#e7f1ea; color:#3f7d55; letter-spacing:0; text-transform:none; font-weight:600; }
.sc-dim .dk .site.nosite{ background:#eef3f8; color:#2f6296; }
.sc-dim .dv{ font-family:var(--heading); font-weight:600; font-size:1.0rem; margin-top:7px; line-height:1.4; }
.sc-dim .dsub{ font-size:0.8rem; color:var(--mute); margin-top:5px; line-height:1.5; }
.sc-tag{ display:inline-block; font-family:var(--label); font-size:0.74rem; font-weight:600; background:var(--light-gray); color:var(--dark); padding:5px 11px; border-radius:999px; margin:2px 4px 2px 0; }
.sc-notes{ margin:14px 0 0; }
.sc-notes ul{ margin:8px 0 0; padding-left:18px; }
.sc-notes li{ font-size:0.86rem; line-height:1.6; margin-bottom:7px; color:var(--dark); }
.sc-export{ margin-top:20px; border-top:1px dashed var(--line); padding-top:18px; }
.sc-export .btn-row{ justify-content:flex-start; }
.sc-json{ width:100%; margin-top:14px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:0.76rem; line-height:1.5; background:var(--dark); color:#e8e6dc; border:none; border-radius:12px; padding:16px; min-height:210px; resize:vertical; white-space:pre; overflow:auto; }
.sc-foot{ font-size:0.79rem; color:var(--mute); margin-top:12px; line-height:1.55; }
.sc-foot code{ background:var(--light-gray); padding:1px 5px; border-radius:5px; font-size:0.92em; }
.sc-foot b{ color:#c2543a; }

.brand-logo{ width:72px; height:72px; margin:0 auto 22px; border-radius:22px; background:var(--dark); display:grid; place-items:center; box-shadow:0 18px 40px -22px rgba(20,20,19,.45); }
.brand-logo svg{ width:46px; height:46px; }
.term-note{ margin:14px 0 22px; border:1px solid var(--line); border-radius:12px; background:#fff; overflow:hidden; }
.term-note summary{ cursor:pointer; padding:12px 15px; font-family:var(--label); font-size:.86rem; font-weight:700; color:var(--dark); list-style:none; }
.term-note summary::-webkit-details-marker{ display:none; }
.term-note summary::after{ content:'열기'; float:right; color:var(--mute); font-size:.78rem; font-weight:600; }
.term-note[open] summary::after{ content:'닫기'; }
.term-note .term-body{ padding:0 15px 14px; color:var(--mute); font-size:.88rem; line-height:1.65; }
.term-note .term-body b{ color:var(--dark); }
.result-type{ font-family:var(--heading); font-weight:800; font-size:clamp(2rem,6vw,3.2rem); line-height:1.18; margin-bottom:10px; }
.result-code{ display:inline-block; margin-bottom:12px; font-family:var(--label); font-size:.72rem; font-weight:700; color:var(--mute); background:var(--light-gray); border-radius:999px; padding:6px 12px; }
.result-promise{ border:1px solid rgba(217,119,87,.35); background:#fdf3ee; border-radius:18px; padding:22px 22px; margin:24px 0; }
.result-promise h4{ color:var(--orange); margin-bottom:8px; }
.result-promise p{ margin:0; color:var(--dark); }
.course-cta{ margin:30px 0 0; padding:26px 24px; border-radius:20px; background:var(--dark); color:var(--light); text-align:center; }
.course-cta h3{ margin-bottom:10px; }
.course-cta p{ margin:0 auto 18px; max-width:620px; color:var(--on-dark-mute); }
.course-cta .btn{ display:inline-block; text-decoration:none; }
.sc-export{ display:none !important; }

/* ---- Fastcampus Leo reference tone override ---- */
:root{
  --dark:#070914;
  --light:#f7f8ff;
  --light-gray:#edf1ff;
  --mid-gray:#8e96ad;
  --orange:#ff8a1d;
  --blue:#244bff;
  --green:#00d6ff;
  --mute:rgba(7,9,20,0.66);
  --on-dark-mute:rgba(255,255,255,0.72);
  --line:rgba(36,75,255,0.16);
}
body{
  background:
    linear-gradient(180deg,#f7f8ff 0%,#eef2ff 42%,#f7f8ff 100%);
}
a{ color:var(--blue); }
::selection{ background:var(--blue); color:#fff; }
:focus-visible{ outline-color:var(--blue); }
.progress{ background:linear-gradient(90deg,#244bff,#00d6ff,#ff8a1d); }
.blob{ display:none; }
.hero{
  background:
    linear-gradient(rgba(36,75,255,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(36,75,255,.055) 1px, transparent 1px),
    radial-gradient(circle at 50% 0%, rgba(36,75,255,.18), transparent 44%);
  background-size:56px 56px,56px 56px,100% 100%;
}
.hero::before{
  content:'';
  position:absolute;
  left:50%;
  top:82px;
  transform:translateX(-50%);
  font-size:clamp(4.2rem,13vw,8.8rem);
  font-weight:900;
  letter-spacing:0;
  color:rgba(36,75,255,.09);
  white-space:nowrap;
  pointer-events:none;
}
.hero h1{
  font-weight:900;
  letter-spacing:0;
  color:#080b17;
}
.hero h1 em{
  color:var(--blue);
  text-shadow:0 0 24px rgba(36,75,255,.16);
  font-style:normal;
}
.lead{
  color:rgba(7,9,20,.72);
  font-weight:600;
}
.hero-kicker{
  max-width:720px;
  margin:0 auto 16px;
  color:rgba(7,9,20,.72);
  font-size:1.02rem;
  font-weight:800;
  line-height:1.7;
}
.hero-kicker b{
  color:#162cff;
}
.eyebrow{
  color:#fff;
  background:linear-gradient(90deg,#070914,#162cff);
  box-shadow:0 16px 40px -28px rgba(36,75,255,.7);
}
.eyebrow::before{ background:#00d6ff; }
.brand-logo{
  background:linear-gradient(145deg,#071022,#244bff);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:0 20px 50px -24px rgba(36,75,255,.8);
}
.hero .brand-logo{
  display:none;
}
.brand-logo svg{
  width:82px;
  height:82px;
}
.track-card,.opt,.axisbox,.panel,.guide-item,.sc-card{
  background:rgba(255,255,255,.88);
  border-color:rgba(36,75,255,.14);
  box-shadow:0 18px 50px -42px rgba(7,9,20,.44);
}
.track-card:hover,.track-card.sel{
  border-color:rgba(36,75,255,.66);
  box-shadow:0 24px 60px -34px rgba(36,75,255,.72);
}
.track-card.sel{ background:linear-gradient(180deg,#fff,#f0f4ff); }
.track-card .ico{ color:#fff; }
.track-card[data-track="maemae"] .ico{ background:linear-gradient(145deg,#00d6ff,#244bff 58%,#071022); }
.track-card[data-track="gyeongmae"] .ico{ background:linear-gradient(145deg,#ff8a1d,#244bff 62%,#071022); }
.miniaxis,.kchip,.result-code,.sc-tag{
  background:#e9eeff;
  color:#162cff;
}
.btn{
  border-radius:10px;
  font-weight:800;
  letter-spacing:0;
}
.btn-primary{
  background:linear-gradient(90deg,#244bff,#1326d8);
  color:#fff;
  box-shadow:0 16px 36px -24px rgba(36,75,255,.8);
}
.btn-primary:hover{
  background:linear-gradient(90deg,#ff8a1d,#ff5d1d);
  color:#070914;
}
.btn-ghost:hover{ border-color:var(--blue); color:var(--blue); }
.bar > span{ background:linear-gradient(90deg,#244bff,#00d6ff); }
.qtrack,.sec-title,.guide-item h4,.reg-body h5{ color:var(--blue); }
.qkind .dot,.qkind .dot.profile{ background:var(--blue); }
.opt:hover,.opt.sel{
  border-color:rgba(36,75,255,.62);
  background:#f0f4ff;
}
.opt.sel .mark{
  border-color:var(--blue);
  background:var(--blue);
}
.result-type{
  letter-spacing:0;
  color:#070914;
}
.rsummary{ font-weight:600; }
.axisbox .ac{ color:var(--blue); }
.axisbox.bl,.result-promise,.panel.blind{

  border-color:rgba(36,75,255,.28);
}
.result-promise h4{ color:var(--blue); }

f"},"name":"무리한 원정 특수러","keywords":["소액분산","특수물건","전국","단기매각"],"summary":"소액으로 전국 특수물건 단타","rare":true},{"code":"A-bcnr","axes":{"FUND":"b","DIFFICULTY":"c","REGION":"n","PURPOSE":"r"},"name":"우량 실거주 낙찰러","keywords":["대액집중","안전입찰","연고지","실수요보유"],"summary":"대액 자기자본으로 연고지 우량 안전물건, 내집·장기보유"},{"code":"A-bcnf","axes":{"FUND":"b","DIFFICULTY":"c","REGION":"n","PURPOSE":"f"},"name":"우량 안전 회전러","keywords":["대액집중","안전입찰","연고지","단기매각"],"summary":"대액으로 연고지 안전 우량물건을 단기 매각(자본 회전)"},{"code":"A-bcwr","axes":{"FUND":"b","DIFFICULTY":"c","REGION":"w","PURPOSE":"r"},"name":"전국 우량 보유가","keywords":["대액집중","안전입찰","전국","실수요보유"],"summary":"대액 안전물건을 전국에서 골라 임대·보유"},{"code":"A-bcwf","axes":{"FUND":"b","DIFFICULTY":"c","REGION":"w","PURPOSE":"f"},"name":"우량 원정 회전러","keywords":["대액집중","안전입찰","전국","단기매각"],"summary":"대액 안전물건 전국 단기매각"},{"code":"A-bxnr","axes":{"FUND":"b","DIFFICULTY":"x","REGION":"n","PURPOSE":"r"},"name":"지역 특수 자산가","keywords":["대액집중","특수물건","연고지","실수요보유"],"summary":"대액으로 연고지 특수물건을 장기 보유·임대"},{"code":"A-bxnf","axes":{"FUND":"b","DIFFICULTY":"x","REGION":"n","PURPOSE":"f"},"name":"지역 특수 수익가","keywords":["대액집중","특수물건","연고지","단기매각"],"summary":"대액 연고지 특수물건을 단기 수익 실현"},{"code":"A-bxwr","axes":{"FUND":"b","DIFFICULTY":"x","REGION":"w","PURPOSE":"r"},"name":"전국 특수 보유가","keywords":["대액집중","특수물건","전국","실수요보유"],"summary":"대액으로 전국 특수물건을 장기 보유(전업 자산가)"},{"code":"A-bxwf","axes":{"FUND":"b","DIFFICULTY":"x","REGION":"w","PURPOSE":"f"},"name":"전업 특수물건 전문가","keywords":["대액집중","특수물건","전국","단기매각"],"summary":"대액·전국·특수물건 단기 수익, 권리분석 고수 영역"}]}};
const PROFILES = {"M-SHRG":{"identity":"좋은 입지의 실거주 한 채를 대출 끼고 장기 보유하며 우상향을 노리는, 대한민국 실수요자의 표준.","strength":"- 검증된 입지(역세권·학군·일자리)를 고르므로 하락장에서도 덜 빠지고 회복이 빠르다.\n- 실거주 1주택이라 비과세·장특공제 등 세제 혜택을 온전히 누린다.\n- 주거 안정과 자산 증식을 한 채로 동시에 해결 — 의사결정이 단순하고 흔들림이 적다.","weakness":"- \"내가 살 수 있는 곳\"이라는 제약 때문에 더 수익 좋은 물건을 놓친다.\n- 한 채에 자산이 집중돼 분산이 없다. 그 지역이 정체되면 내 자산 전체가 정체된다.\n- 레버리지를 썼기에 금리 상승·소득 변동에 가계 현금흐름이 직접 노출된다.","blindspot":"당신은 \"실거주니까 가격이 빠져도 상관없다\"고 자기합리화하기 쉽다. 그러나 갈아타기를 염두에 둔다면 매도 시점의 시세와 상급지와의 갭은 당신의 미래 선택지를 직접 결정한다. 실거주라는 명분 뒤에 숨어 입지·환금성 검증을 게을리하면, 정작 더 좋은 곳으로 옮겨야 할 때 발이 묶인다. 또 DSR 한도까지 대출을 당겨놓고 \"버티면 된다\"고 믿는데, 버티는 동안의 이자·기회비용은 수익률에서 조용히 차감된다.","market":"상승장·회복장 초입에서 가장 강하다. 횡보장은 무난, 급락장에선 레버리지 부담을 견디는 인내가 시험대.","partner":"M-SHPE(자기자본·순수투자 — 분산과 레버리지 절제 감각), M-ATPG(공격·회전 — 시장 타이밍과 환금성 감각을 빌릴 것)."},"M-SHRE":{"identity":"빚 없이 우량 실거주 한 채를 마련해 마음 편히 오래 사는, 안정의 끝판왕.","strength":"- 무차입이라 금리·역전세·경기 충격에 거의 면역. 어떤 하락장도 버틴다.\n- 현금흐름에 여유가 있어 생활의 질과 심리적 안정이 높다.\n- 1주택 비과세를 그대로 누리며, 급매·기회가 왔을 때 즉시 동원할 신용 여력이 있다.","weakness":"- 레버리지를 안 쓰니 자산 증식 속도가 느리다. 상승장에서 남들보다 덜 번다.\n- 현금을 한 채에 묶어두는 기회비용이 크다 — 같은 돈으로 두 채를 굴릴 수 있었다.\n- 지나친 안전 추구로 \"더 좋은 입지로의 갈아타기\" 같은 합리적 모험도 회피하기 쉽다.","blindspot":"당신은 \"빚이 없으니 안전하다\"를 절대 명제로 믿지만, 무차입의 진짜 비용은 보이지 않는 기회비용이다. 인플레이션 시기에 현금·저레버리지는 실질 구매력을 갉아먹고, 우량 자산 상승분을 통째로 놓친다. 안전을 자산 방어로만 정의하면, 자산이 물가를 못 따라가는 '느린 손실'을 못 본다. 레버리지 자체가 악이 아니라 감당 못 할 레버리지가 악임을 구분하라.","market":"하락장·고금리 국면에서 압도적으로 강하다(현금이 왕). 상승장에선 상대적으로 소외.","partner":"M-SHRG·M-SHPG(적정 레버리지로 증식 속도를 빌릴 것)."},"M-SHPG":{"identity":"검증된 입지에 전세 레버리지로 묻어두고 시간을 내 편으로 만드는, 갭투자의 정석.","strength":"- 우량지 + 전세 레버리지 조합으로 적은 자기자본으로 우상향 자산을 선점한다.\n- 실거주 제약이 없어 오직 입지·수익률 기준으로 최적 물건을 고른다.\n- 장기 보유라 단기 변동을 무시하고 복리·시세 상승을 온전히 가져간다.","weakness":"- 전세가가 곧 레버리지이므로 역전세(전세가 하락) 시 보증금 반환 압박에 직격탄.\n- 다주택 경로로 가면 취득세·종부세·양도세 중과가 수익을 잠식한다.\n- 무주택자라면 실거주 한 채 마련을 미루다 정작 본인 주거가 불안정해질 수 있다.","blindspot":"당신은 \"우량지니까 전세는 늘 잘 나간다\"고 가정하지만, 전세 레버리지는 만기마다 재설정되는 단기 부채다. 입주 물량 폭탄이나 금리 급등으로 전세가가 빠지면, 보유한 장기 시나리오와 무관하게 당장 수천만 원을 토해내야 한다. '장기 보유'라는 말이 '아무것도 안 해도 된다'는 뜻이 아니다 — 전세 만기 캘린더와 역전세 대비 현금 버퍼를 항상 들고 있어야 한다. 또 무주택 상태로 남의 집만 사다가 청약·실거주 비과세 기회를 통째로 날리는 경우가 흔하다.","market":"상승장·전세가 상승기에 최강. 입주 폭탄·역전세 국면이 최대 약점.","partner":"M-SHRE(무차입 버퍼 감각), M-SHPE(자기자본 비중을 높여 역전세 방어)."},"M-SHPE":{"identity":"자기자본으로 우량 물건을 사서 느리지만 단단하게 불려가는, 리스크 없는 복리주의자.","strength":"- 무차입·우량 조합이라 역전세·금리에 흔들리지 않고 어떤 국면도 버틴다.\n- 순수투자 관점이라 감정 없이 수익률로만 판단, 물건 선택의 자유도가 높다.\n- 하락장에 현금 동원력으로 우량 급매를 줍는 역발상 매수가 가능하다.","weakness":"- 자본 회전·확장 속도가 느려 상승장 수익 극대화를 놓친다.\n- 좋은 기회 앞에서도 레버리지를 거부해 규모의 경제를 못 만든다.\n- 신중함이 지나쳐 매수 실행이 늦어 타이밍을 놓치는 경우가 있다.","blindspot":"\"단단함\"에 대한 자부심이 행동을 마비시킨다. 분석은 완벽한데 방아쇠를 못 당겨, 결국 검토만 하다 끝나는 분석마비에 빠지기 쉽다. 또 무차입을 고집하다 보면 자본 효율이 떨어져, 같은 안목으로 레버리지를 적정 사용한 사람 대비 장기 누적 수익이 크게 벌어진다. 안전한 게 아니라 '느린' 것일 수 있다는 점을 직시하라.","market":"하락장·횡보장에서 빛난다(현금·인내가 무기). 급등장에선 소외.","partner":"M-SHPG·M-ATPG(레버리지·실행 속도를 빌릴 것)."},"M-STRG":{"identity":"실거주하며 비과세 타이밍에 맞춰 상급지로 안전하게 환승하는 사다리 등반가.","strength":"비과세 요건을 활용한 절세 환승, 거주 안정과 자산 상승의 균형, 검증된 입지만 노려 리스크 통제.","weakness":"잦은 환승의 거래비용(취득세·중개비·이사), 갈아타기 타이밍에 시장이 역행하면 손실, 일시적 2주택 처분기한 압박.","blindspot":"갈아타기를 '항상 한 단계 위로' 가는 일방통행으로 가정하지만, 매도와 매수가 같은 시장에서 동시에 일어난다 — 상급지가 더 빨리 오르면 격차가 벌어져 영영 못 따라잡는다. 처분기한과 자금 조달의 타이밍 리스크를 과소평가하기 쉽다.","market":"횡보·완만한 상승장(상급지 갭이 안 벌어질 때).","partner":"M-SHRE(무리한 환승 절제), M-AHPG(상급지 선점 안목)."},"M-STRE":{"identity":"빚을 최소화하며 보수적으로 실거주를 갈아타는 돌다리 두드림형.","strength":"무리 없는 자금계획, 하락장 방어력, 거주 안정.","weakness":"환승 속도가 느려 기회 상실, 무차입 제약으로 상급지 진입 지연, 과도한 신중함.","blindspot":"신중함이 곧 안전이라 믿지만, 실거주 갈아타기는 미룰수록 상급지와의 격차가 복리로 벌어진다. '준비되면 옮기겠다'는 무한 연기로 끝나기 쉽다.","market":"하락·횡보장.","partner":"M-STRG, M-AHRG."},"M-STPG":{"identity":"검증된 물건만 골라 전세 레버리지로 짧게 회전하는 안전지향 단타러.","strength":"리스크 낮은 물건만 단기 회전해 자본 회전율↑, 입지 검증으로 환금성 확보.","weakness":"단기 양도세 중과로 세후 수익 급감, 거래비용 누적, 안전물건은 마진이 박함.","blindspot":"\"안전한 물건이니 잘 팔린다\"고 보지만 단타의 진짜 적은 양도세율(2년 미만 중과)과 거래비용이다. 세전 수익에 취해 세후 실수령을 계산 안 하면 헛심만 쓴다.","market":"거래 활발한 상승장.","partner":"M-SHPG(장기 전환 판단), M-SHPE."},"M-STPE":{"identity":"자기자본으로 안전한 물건만 짧게 차익 보려는, 다소 동기가 약한 보수적 단타러.","strength":"무차입 단타라 리스크 최소, 손실 회피 강함.","weakness":"보수+단기는 동기 충돌 — 안전물건 단기차익은 세후 남는 게 적다. 자본 비효율.","blindspot":"안전과 단기차익을 동시에 원하지만 이 둘은 본질적으로 상충한다. 어느 쪽도 제대로 못 챙기는 어중간한 포지션이 되기 쉽다. 장기보유나 적정 레버리지 중 하나로 정체성을 정하라.","market":"상승장 한정(그 외엔 매력 약함).","partner":"M-SHPE(장기 전환), M-ATPG."},"M-AHRG":{"identity":"개발 기대 지역에 실제로 살면서 대출 끼고 장기 시세차익을 노리는 실거주 베터.","strength":"거주하며 호재 실현을 기다려 주거비+투자 일석이조, 실거주 비과세 가능, 호재 적중 시 큰 차익.","weakness":"호재 지연·무산 리스크를 거주지에 그대로 안음, 정비사업 장기화 시 생활 불편, 레버리지+불확실성 이중 부담.","blindspot":"\"내가 사는 곳이 개발된다\"는 기대에 감정이 실려 호재의 실현 확률·시점을 낙관 편향한다. 정비사업은 평균 10년+, 무산도 흔하다. 실거주 만족도와 투자 기대를 분리해 냉정히 보라.","market":"상승장·개발 사이클 초입.","partner":"M-SHRG(검증입지 균형), M-AHPE."},"M-AHRE":{"identity":"현금으로 저평가 실거주지를 사서 묵묵히 장기 베팅하는 뚝심형.","strength":"무차입이라 호재 지연을 버틸 체력, 역발상 저가 매수, 거주 안정.","weakness":"자본 묶임, 호재 무산 시 기회비용, 무차입으로 확장 불가.","blindspot":"\"버틸 수 있으니 언젠간 오른다\"는 무한 인내가 함정. 호재가 영영 안 올 수도 있고, 그 사이 다른 우량지는 먼저 오른다. 시간도 비용이다.","market":"하락·횡보장 진입.","partner":"M-SHRE, M-AHPG."},"M-AHPG":{"identity":"재건축·재개발·정비사업 기대가 있는 저평가지에 전세·대출 레버리지를 태워 장기 보유하는, 호재 투자의 전형.","strength":"- 저평가 진입 + 호재 실현이 맞물리면 일반 우량지를 압도하는 수익(멀티배거)을 낸다.\n- 순수투자 관점이라 거주 제약 없이 사업성 좋은 구역만 골라 담는다.\n- 장기 보유 전제라 정비사업의 긴 호흡(조합 설립~이주~준공)을 견딜 구조를 짠다.","weakness":"- 정비사업은 지연·무산·분담금 폭탄 등 변수가 많아 시나리오가 자주 깨진다.\n- 레버리지 + 호재 불확실성의 이중 리스크 — 둘 다 어긋나면 손실이 증폭된다.\n- 사업 단계 중 환금성이 극히 낮아 급전이 필요할 때 못 판다.","blindspot":"당신은 호재의 '상승 시나리오'는 정교하게 그리지만, 시간 비용과 무산 리스크는 습관적으로 할인한다. 정비사업은 구역지정부터 입주까지 평균 10년이 넘고, 조합 내분·분담금 급등·경기 침체로 멈추는 경우가 절반에 가깝다. \"결국 된다\"는 믿음으로 분담금 추가 납입과 장기 자금 동결을 견디는 동안, 같은 돈을 우량지에 넣었다면 얻었을 수익(기회비용)이 당신의 실질 수익률을 갉아먹는다. 사업단계(조합설립인가·사업시행인가·관리처분인가)별 리스크가 천차만별인데 이를 뭉뚱그려 '호재'로 퉁치는 것도 위험하다. 진입 단계가 빠를수록 수익은 크지만 무산 확률도 크다.","market":"상승장·유동성 확장기(사업 추진력↑). 고금리·침체기엔 사업 지연 직격탄.","partner":"M-SHPG(검증입지로 포트폴리오 안정), M-SHPE(현금 버퍼로 분담금 대비)."},"M-AHPE":{"identity":"자기자본으로 저평가 물건을 사두고 시장이 알아줄 때까지 인내하는 역발상가.","strength":"무차입이라 무한정 버티는 체력, 남들 외면할 때 줍는 역발상, 호재 적중 시 무레버리지로도 큰 차익.","weakness":"자본이 오래 묶임, 저평가가 '저평가인 채로' 정체될 위험, 확장 불가.","blindspot":"\"싸니까 안전하다\"는 가치투자 신념이 함정 — 싼 데는 이유가 있을 수 있고, 카탈리스트(상승 촉매) 없는 저평가는 영원히 저평가다. 가격이 아니라 '무엇이 가격을 올릴 것인가'를 봐야 한다.","market":"하락장 바닥·횡보장.","partner":"M-AHPG(호재 안목), M-ATPG(타이밍·실행)."},"M-ATRG":{"identity":"호재 지역으로 실거주를 빠르게 환승하며 레버리지를 적극 활용하는 공격적 사다리꾼.","strength":"빠른 환승으로 상승 흐름 갈아타기, 레버리지로 진입장벽 돌파, 호재 선점.","weakness":"잦은 거래비용+단기 양도세, 레버리지+공격+단기 삼중 리스크, 타이밍 실패 시 큰 손실.","blindspot":"실거주라는 명분으로 사실상 고위험 단타를 하면서 위험을 과소평가한다. 갈아탈 때마다 시장·세금·자금이 동시에 맞아떨어져야 하는데, 한 박자만 어긋나도 사다리에서 미끄러진다.","market":"강한 상승장.","partner":"M-STRG(절제), M-SHRG."},"M-ATRE":{"identity":"현금으로 공격적 실거주 단기 환승을 하는 드문 현금부자 역발상가.","strength":"무차입이라 공격 베팅도 버팀, 빠른 의사결정, 현금 협상력.","weakness":"공격+무차입+단기는 부자연한 조합(보통 공격은 레버리지 동반), 자본 비효율, 거래비용.","blindspot":"현금 동원력을 과신해 단기 공격 베팅의 변동성을 가볍게 본다. 무차입이어도 단타 양도세와 잘못된 타이밍은 그대로 손실이다. 희귀 조합인 만큼 본인 성향이 정말 이쪽인지 재점검하라.","market":"변동성 큰 상승장.","partner":"M-SHRE, M-ATPG."},"M-ATPG":{"identity":"저평가·호재 물건을 풀레버리지로 단기 회전시키는, 매매 트랙 최고 위험·최고 수익의 승부사.","strength":"- 레버리지를 극대화해 적은 자기자본으로 큰 포지션을 잡고, 적중 시 수익률이 폭발적이다.\n- 시장 타이밍·호재 흐름에 민감해 기회 포착과 진입·청산이 빠르다.\n- 자본 회전이 빨라 한 사이클의 수익을 곧장 다음 기회에 재투입, 복리 가속.","weakness":"- 풀레버리지 + 단기 + 공격물건 = 삼중 위험. 하나만 어긋나도 손실이 증폭된다.\n- 단기 양도세 중과로 세전 수익의 상당분이 증발한다.\n- 금리·역전세·거래 위축에 가장 먼저, 가장 크게 노출된다.","blindspot":"당신은 몇 번의 성공으로 '내가 시장을 읽는다'는 과신에 빠지기 가장 쉬운 유형이다. 풀레버리지 단타는 상승장에선 천재처럼 보이지만, 그건 실력이 아니라 시장이 받쳐준 결과일 수 있다. 유동성이 마르고 거래가 멈추는 순간 — 팔아서 빠져나와야 할 때 못 파는 환금성 함정 — 에 풀레버리지는 마진콜로 돌변한다. 출구가 막힌 단타는 강제 장기보유가 되고, 그땐 이자가 당신을 갉아먹는다. 수익 시나리오만큼 '못 팔았을 때'의 자금 시나리오를 똑같이 정교하게 짜라. 그리고 세후 수익으로만 성과를 측정하라.","market":"거래량 폭발하는 강한 상승장에서만 강하다. 횡보·하락장에선 가장 위험.","partner":"M-SHPE(현금 버퍼·역전세 방어), M-SHRE(브레이크 역할)."},"M-ATPE":{"identity":"자기자본으로 저평가 물건을 짧게 차익 실현하는 드문 현금형 공격 단타러.","strength":"무차입이라 레버리지 리스크 없이 공격 베팅, 빠른 청산, 하락 버퍼.","weakness":"공격+무차입+단기는 동기 약한 희귀 조합, 자본 비효율, 단기 양도세.","blindspot":"무차입이라 안전하다 여기지만 단타의 진짜 비용은 세금과 타이밍이다. 공격 물건을 짧게 굴리면서 레버리지를 안 쓰는 건 수익 잠재력을 스스로 깎는 셈 — 정체성을 장기보유(M-AHPE)나 레버리지 회전(M-ATPG) 중 하나로 명확히 하라.","market":"변동성 상승장.","partner":"M-AHPE, M-ATPG.\n\n---\n\n# 경매(競賣) 트랙 16유형\n\n> 개인화 변수(경매경험·주택보유상황)는 가이드에서 경고로 반영. 프로필은 성향 골격."},"A-scnr":{"identity":"소액으로 익숙한 동네의 권리 깨끗한 물건을 낙찰받아 실거주·실수요로 쓰는, 경매 입문의 표준이자 최빈 유형.","strength":"- 잘 아는 동네라 시세·임차수요·학군을 꿰고 있어 적정 입찰가 산정이 정확하다.\n- 권리 단순(말소기준 이하 모두 소멸)한 물건만 골라 권리분석 실패 리스크가 거의 없다.\n- 소액·실거주라 자금 부담이 작고, 명도도 점유자 협의로 비교적 수월하다.","weakness":"- 안전·연고지라 경쟁자가 많아 낙찰가율이 높다 — 시세 대비 메리트가 줄어든다.\n- 소액·동네 한정이라 기회 풀이 좁고 수익 규모가 작다.\n- 초보가 많아 '경매로 샀다'는 사실에 취해 시세보다 비싸게 낙찰(고가낙찰)하기 쉽다.","blindspot":"당신의 가장 큰 위험은 권리분석이 아니라 '입찰가'다. 안전한 물건일수록 사람이 몰려, 감정에 휩쓸려 시세에 근접하거나 오히려 비싸게 써내는 고가낙찰이 흔하다. 경매의 본질은 '싸게 사는 것'인데, 경쟁에 이기는 데 몰두하다 정작 마진을 날린다. 또 \"동네라 잘 안다\"는 자신감이 시세 조사를 대충하게 만든다 — 호가와 실거래가, 급매가는 다르다. 입찰 전 반드시 최근 실거래·급매 시세에서 '거꾸로' 입찰 상한선을 정하고, 그 선을 넘으면 미련 없이 포기하라. 명도도 '협의되겠지' 낙관하다 인도명령·강제집행까지 가는 경우가 있으니 점유자 현황을 미리 파악하라.","market":"어느 국면에서도 무난(실거주 기반). 하락장에 낙찰가율이 떨어져 메리트↑.","partner":"A-bxnf(특수물건·협상 감각), A-scnf(출구·매각 감각)."},"A-scnf":{"identity":"연고지의 안전한 물건을 소액으로 낙찰받아 수리·명도 후 빠르게 되팔아 차익을 남기는 동네 단타러.","strength":"- 동네 시세를 잘 알아 매입~매각 스프레드 계산이 정확하고 출구가 빠르다.\n- 권리 깨끗한 물건만 다뤄 명도·소송 리스크를 최소화하며 회전한다.\n- 소액 다건 회전으로 경험과 현금흐름을 빠르게 쌓는다.","weakness":"- 단기 매각은 양도세(보유기간 짧을수록 중과)와 거래비용이 수익을 크게 깎는다.\n- 안전물건은 경쟁으로 낙찰가가 높아 차익 폭이 얇다.\n- 수리·명도 기간이 예상보다 길어지면 회전 전제가 깨진다.","blindspot":"당신은 '싸게 낙찰 → 비싸게 매각' 스프레드만 보지만, 진짜 수익은 세후·비용후 기준이다. 단기 양도세, 명도 비용, 수리비, 중개비, 보유 기간 이자를 다 빼면 '남는 줄 알았는데 본전'인 경우가 흔하다. 특히 다주택자라면 단기 양도세율이 살벌하다. 또 매각이 예상대로 빨리 안 되면 단타가 강제 보유로 바뀌고 자금이 묶인다 — 출구(매수 대기 수요)를 낙찰 전에 검증하라.","market":"거래 활발한 상승장(빠른 매각 가능). 거래 위축기엔 출구 막힘.","partner":"A-scnr(보유 안정 감각), A-bxnf(고마진 특수물건 안목)."},"A-scwr":{"identity":"소액 안전물건을 전국에서 찾아 임대·보유하는 원정 임대형(원격 거주는 비현실 → 사실상 전국 임대보유).","strength":"전국 기회 풀로 고수익 임대물건 발굴, 안전물건이라 권리 리스크 낮음, 임대 현금흐름.","weakness":"원격 임장·관리 부담, 지역 시세 정보 비대칭, 공실·관리 리스크.","blindspot":"수익률 숫자(표면 이율)에 끌려 원격 관리·공실·환금성 비용을 과소평가한다. 모르는 지역의 '싼 임대물'은 싼 이유(수요 부족)가 있을 수 있다. 현지 관리 체계 없이 전국에 깔면 관리 부재로 수익이 새어나간다.","market":"임대수요 견고한 횡보·상승장.","partner":"A-scnr(연고지 관리 강점), A-bxwr."},"A-scwf":{"identity":"소액 안전물건을 전국에서 추적해 낙찰 후 빠르게 매각차익을 실현하는, 발품형 수익률 사냥꾼.","strength":"- 지역에 얽매이지 않고 전국에서 가장 저평가된 안전물건을 골라 마진을 극대화한다.\n- 권리 단순 물건만 다뤄 낯선 지역에서도 권리 리스크는 통제된다.\n- 소액 다건·빠른 회전으로 자본 효율을 높이고 데이터·네트워크를 축적한다.","weakness":"- 원격지 시세·매각 수요 파악이 어려워 출구 리스크가 크다.\n- 단기 양도세 + 원정 비용(교통·임장·명도)이 마진을 잠식한다.\n- 명도·매각이 지연되면 원격지라 대응이 느리고 비용이 눈덩이.","blindspot":"당신은 '낙찰가 대비 시세'라는 진입 스프레드는 잘 보지만, 낯선 지역의 '출구'를 과신한다. 낙찰은 쉬워도 그 지역에서 내가 원하는 가격에 사줄 매수자가 있는지는 별개다 — 지방·소도시는 매수 대기 수요가 얇아 매각이 몇 달씩 걸리고, 그동안 단타 전제가 무너진다. 또 여러 지역에 동시에 벌여놓다 명도·매각이 겹치면 관리 capacity를 초과해 모두 어정쩡해진다. 진입 전에 '그 지역 최근 매각 소요기간'과 '실수요 매수층'을 반드시 확인하고, 동시 진행 건수를 본인이 감당할 수준으로 제한하라.","market":"지역별 순환매가 도는 상승장. 거래 위축기엔 원격 출구가 가장 먼저 막힘.","partner":"A-scnr(연고지 시세 우위), A-bcnr(집중·보유 안정)."},"A-sxnr":{"identity":"소액으로 연고지 특수물건(지분·유치권 등)을 실수요·보유로 공략하는 도전자.","strength":"연고지라 정보 우위, 특수물건이라 경쟁↓·저가 낙찰, 보유로 안정.","weakness":"※자금-난이도 불일치 — 특수물건은 소송·명도에 추가 자금·기간 버퍼 필요한데 소액과 충돌. 분석 실패 시 자금 묶임.","blindspot":"소액으로 특수물건을 다루려다 정작 소송·명도에 들어갈 예비비를 마련 못 한다. 특수물건은 낙찰가가 싸도 해결 비용이 본체보다 클 수 있다. 연고지 정보 우위가 권리분석 역량을 대체하진 못한다 — 권리 자체가 안 풀리면 동네라도 소용없다.","market":"국면 무관(개별 물건 해결 역량이 좌우).","partner":"A-bxnr(자금 버퍼), A-scnr."},"A-sxnf":{"identity":"연고지 특수물건을 소액으로 공략해 권리 해결 후 단기 차익을 노리는 고위험 단타러.","strength":"특수물건 저가 낙찰 + 연고지 정보 + 빠른 회전 의지.","weakness":"고위험(권리분석·명도·소송), 소액으로 특수물건 단타는 자금·시간 버퍼 부족, 경험 필수.","blindspot":"특수물건의 '권리 해결 기간'을 단기로 가정하지만 유치권·지분 분쟁은 협상·소송으로 수개월~수년 간다. 단타 전제가 깨지면 소액 자금이 장기간 묶여 다음 기회를 못 잡는다. 경험이 부족하면 해결 자체가 불가능할 수도 있다.","market":"국면 무관, 단 본인 역량이 절대 변수.","partner":"A-bxnf, A-scnf."},"A-sxwr":{"identity":"소액으로 전국 특수물건을 보유 목적으로 공략하는, 자금-난이도-거리 삼중 부담의 희귀형.","strength":"전국 특수물건 풀에서 초저가 발굴 가능.","weakness":"자금·난이도·거리 삼중고. 원격에서 특수물건 권리 해결은 현실적으로 매우 어려움.","blindspot":"세 가지 어려운 조건을 동시에 떠안으면서 각각을 과소평가한다. 원격지 특수물건은 임장·소송·명도 모두 원거리에서 처리해야 해 비용·시간이 폭증한다. 본인이 정말 이 조합을 감당할 자원이 있는지 냉정히 재검토하라.","market":"사실상 권장 안 함(전문 역량+현지 네트워크 전제).","partner":"A-bxwr(자금·전국 역량), A-bxnf(특수물건 역량)."},"A-sxwf":{"identity":"소액으로 전국 특수물건을 단타하려는, 초보 과욕의 전형 — 가장 강한 경고 대상.","strength":"(이론상) 최저가 낙찰 잠재력. 실전에선 강점보다 위험이 압도.","weakness":"소액·특수·전국·단기 — 네 가지 고난도 조건의 최악 조합. 자금·시간·거리·난이도 전부 불리.","blindspot":"\"싸게 낙찰받아 빨리 팔면 된다\"는 환상이 가장 위험하다. 특수물건은 빨리 못 팔고, 원격이라 대응 못 하고, 소액이라 소송비가 없다. 네 악조건이 동시에 터지면 자금 전체가 묶이고 손실이 확정된다. 초보라면 절대 들어가지 마라. 이 성향이 나왔다면 자금 규모를 키우거나(b), 난이도를 낮추거나(c), 연고지로 좁히거나(n) 최소 한 축은 조정하라.","market":"없음(권장 불가).","partner":"A-bxwf(전업 특수 전문가의 멘토링 필수), A-scnr(기본으로 회귀)."},"A-bcnr":{"identity":"큰 자기자본으로 연고지의 우량 안전물건을 낙찰받아 내집마련·장기 보유하는, 자산가형 실수요자.","strength":"- 대액·자기자본이라 자금·금리 리스크가 거의 없고, 우량물건을 시세보다 싸게 확보한다.\n- 연고지 우량물건이라 환금성·임차수요가 탄탄하고 장기 보유 안정성이 높다.\n- 권리 단순 물건만 골라 경매 리스크를 최소화하면서 시장가보다 싸게 내집을 마련한다.","weakness":"- 우량·안전·연고지는 경쟁이 치열해 낙찰가율이 높아 '경매 메리트'가 줄어든다.\n- 큰 자본을 한 물건에 집중해 분산이 없다.\n- 보수적이라 더 높은 수익(특수물건·전국)을 의도적으로 포기한다.","blindspot":"당신은 자금력이 충분해 '안전하게 좋은 물건'을 노리지만, 바로 그 물건에 사람이 가장 많이 몰린다. 자금 여유가 오히려 독이 되어 \"이 정도면 써도 된다\"며 낙찰가를 끌어올려, 결국 일반 매매와 다를 바 없는 가격에 사고도 '경매로 싸게 샀다'고 착각한다. 대액 집중이라 한 번의 고가낙찰이 큰 손실로 직결된다. 또 자금이 충분하다는 이유로 권리분석·시세조사를 남에게 맡기고 안일해지기 쉽다. 입찰가 상한선을 시세 기반으로 못 박고, 경쟁이 과열되면 다음 물건을 기다리는 절제가 핵심이다.","market":"하락장(낙찰가율 하락 + 현금 동원력으로 우량 급매 흡수)에서 최강.","partner":"A-bxnf(특수물건으로 메리트 확보), A-scwf(분산·기회탐색 감각)."},"A-bcnf":{"identity":"대액으로 연고지 우량 안전물건을 낙찰받아 단기 매각으로 자본을 회전시키는 회전러.","strength":"우량물건 빠른 매각, 큰 자본으로 임팩트 있는 차익, 연고지 출구 확보.","weakness":"단기 양도세 부담 큼(대액일수록 절대액↑), 안전물건 경쟁으로 진입 마진 박함, 자본 회전을 안전물건에 쓰는 비효율.","blindspot":"큰 자본을 마진 박한 안전물건 단타에 굴리는 자본 비효율을 못 본다. 대액이면 집중·특수나 장기 보유가 합리적인 경우가 많다. 단기 양도세 절대액이 크다는 점도 과소평가하기 쉽다.","market":"거래 활발한 상승장.","partner":"A-bcnr(보유 전환), A-bxnf(고마진 특수)."},"A-bcwr":{"identity":"대액 안전물건을 전국에서 골라 임대·보유하는 분산 임대 자산가.","strength":"전국 우량물건 분산 포트폴리오, 안정적 임대 현금흐름, 권리 리스크 낮음.","weakness":"원격 관리 부담, 대액 분산이라 관리 복잡, 안전물건 수익률 한계.","blindspot":"전국 분산을 리스크 분산으로 여기지만 관리 역량 분산이기도 하다. 현지 관리 인프라 없이 전국에 깔면 공실·관리 부실로 수익이 샌다. 우량·안전에 안주해 수익률이 평범해진다.","market":"임대수요 견고한 횡보·상승장.","partner":"A-bcnr(연고지 집중), A-bxwr."},"A-bcwf":{"identity":"대액 안전물건을 전국에서 단기 매각으로 회전시키는, 자본 효율이 의심되는 유형.","strength":"전국 기회 풀, 큰 자본의 회전력.","weakness":"※대액인데 소액형(박리다매) 전략 — 자본 비효율. 원격 출구 리스크 + 단기 양도세 + 원정 비용.","blindspot":"큰 자본을 마진 박한 안전물건 원정 단타에 굴리는 건 자본 효율 최악 조합 중 하나다. 대액이면 집중·특수 또는 보유로 가는 게 합리적이다. 원격 출구와 세금을 동시에 과소평가하기 쉽다.","market":"강한 상승장 한정.","partner":"A-bxwf(특수로 마진 확보), A-bcnr."},"A-bxnr":{"identity":"대액으로 연고지 특수물건을 장기 보유·임대하는 지역 기반 자산가.","strength":"자금 버퍼로 특수물건 권리 해결 여유, 연고지 정보 우위, 저가 매입 후 보유로 안정.","weakness":"권리분석·소송 역량 필수, 자본 장기 묶임, 특수물건 보유 전환의 명도·정상화 기간.","blindspot":"자금이 충분해 특수물건을 '해결할 수 있다'고 보지만, 돈으로 시간을 다 사지는 못한다 — 지분·유치권 분쟁은 상대가 있어 협상·소송 기간을 통제하기 어렵다. 보유 전환 전까지의 기회비용을 과소평가하기 쉽다.","market":"국면 무관(개별 해결력이 좌우).","partner":"A-bxnf(출구·수익 실현), A-bcnr."},"A-bxnf":{"identity":"큰 자본으로 연고지 특수물건을 공략해 권리를 풀고 단기 수익을 실현하는, 지역 경매 고수.","strength":"- 자금 버퍼가 충분해 유치권·지분·법정지상권 등 고난도 물건의 소송·명도·합의금을 감당하며 경쟁 없는 저가 낙찰의 큰 마진을 가져간다.\n- 연고지라 시세·임차수요·매각 출구를 정확히 알아 권리 해결 후 빠르게 수익화한다.\n- 권리분석 역량 + 자본력 + 지역 정보의 삼박자로 진입장벽 높은 시장을 독점적으로 공략한다.","weakness":"- 권리분석 한 번의 오판이 큰 손실 — 대액이라 타격이 크다.\n- 명도·소송 기간이 길어지면 단기 수익 전제가 흔들리고 자본이 묶인다.\n- 고난도 영역이라 실력 없이 흉내 내면 가장 위험한 유형이 된다.","blindspot":"당신은 권리분석과 협상에 자신이 있어 '해결 가능하다'고 빠르게 판단하지만, 특수물건의 변수는 법리보다 '사람'이다 — 유치권자·지분 공유자·점유자가 비합리적으로 버티면 협상은 교착되고 소송은 예상의 두 배로 길어진다. 자본력이 조급함을 부추겨 '빨리 끝내려' 과한 합의금을 주거나, 반대로 자신감이 과해 해결 난도를 낮춰 보는 두 극단을 오간다. 한 건의 마진이 크다는 데 취해 동시에 여러 건을 벌이면 분쟁 관리 capacity를 초과한다. 진입 전 '최악의 경우 해결에 걸리는 기간·비용'을 보수적으로 잡고, 그래도 수익이 나는지로 입찰가를 정하라.","market":"국면 의존도 낮음(개별 물건 해결력이 수익을 만든다). 침체기엔 경쟁이 더 줄어 기회↑.","partner":"A-bcnr(안전 보유로 포트폴리오 안정), A-bxwf(전국 특수 네트워크 확장)."},"A-bxwr":{"identity":"대액으로 전국 특수물건을 장기 보유하는 전업 자산가형.","strength":"전국 특수물건 풀에서 초저가 발굴, 자금 버퍼로 해결, 보유로 장기 수익화.","weakness":"원격 특수물건 해결의 고비용·고난도, 자본 장기 묶임, 전업 수준 역량·인프라 필요.","blindspot":"전국+특수의 결합은 임장·소송·명도를 모두 원거리에서 처리해야 해, 자금이 있어도 시간과 관리 한계가 병목이 된다. 보유 전환까지의 긴 정상화 기간과 원격 관리 비용을 과소평가하기 쉽다.","market":"국면 무관(전업 역량 전제).","partner":"A-bxnf(연고지 집중력), A-bcwr."},"A-bxwf":{"identity":"큰 자본으로 전국의 특수물건을 추적해 권리를 풀고 단기 수익을 실현하는, 경매 트랙 최고 난도의 전업 전문가.","strength":"- 전국 + 특수 + 대액 + 단기의 결합으로, 아무도 못 들어가는 고난도 물건에서 최고 마진을 독점한다.\n- 권리분석·소송·명도·협상의 전 과정을 시스템화해 빠르게 해결하고 회전시킨다.\n- 지역에 얽매이지 않아 전국에서 가장 수익성 높은 특수물건만 선별, 자본 효율이 극대화된다.","weakness":"- 최고 난도 조합 — 권리분석 오판, 원격 명도 지연, 소송 장기화가 동시에 터지면 손실이 막대하다.\n- 전국 원정 + 다건 분쟁 관리로 capacity 초과 위험이 상존한다.\n- 전업 수준의 법률·세무·현지 네트워크 없이는 불가능 — 진입장벽이 가장 높다.","blindspot":"당신은 이 트랙의 정점이지만, 바로 그 자신감이 가장 큰 리스크다. 과거 성공 패턴을 새 물건에 그대로 대입하다 지역별 관행·법원별 운영·점유자 변수의 차이를 놓친다. 전국 다건을 동시에 굴리면 한 건의 소송 교착이 전체 현금흐름을 막는 연쇄 위험이 있는데, 회전 속도에 취해 이를 과소평가한다. 또 '특수물건 전문가'라는 정체성이 일반·안전물건의 쉬운 수익을 무시하게 만들어, 굳이 어려운 길만 고집하는 비효율에 빠지기도 한다. 동시 진행 건수에 상한을 두고, 각 건의 최악 시나리오(소송 패소·명도 장기화) 자금을 따로 적립한 상태에서만 새 입찰에 들어가라. 단기 수익이라도 다건·대액이면 단기 양도세 부담이 거대하니 세후로 설계하라.","market":"국면 의존도 가장 낮음(실력이 곧 수익). 경쟁 적은 침체기에 오히려 기회 확대.","partner":"A-bxnr(연고지 깊이로 안정), A-bcwr(보유 전환으로 현금흐름 균형)."}};
const GUIDES = {"M-SHRG":[{"label":"적합 물건","body":"역세권·학군·일자리 접근성 좋은 검증 입지의 국민평형(전용 59~84). 신축~준신축 선호. 본인 소득 대비 DSR 감당되는 가격대의 '갈아타기 사다리 중간 칸'."},{"label":"피해야 할 함정","body":"\"실거주니까 시세는 신경 안 써도 된다\"는 자기합리화. 대출 한도 끝까지 당겨 현금 버퍼 제로로 매수. 분양가·호가에 끌려 환금성 검증 생략."},{"label":"매수 전 체크리스트","body":"1. 금리 +2%p 스트레스 시에도 원리금이 가계 가처분의 일정선(통상 30~40%) 이내인가.\n2. 최근 3개월 실거래가·급매가 기준으로 호가 거품 여부 확인.\n3. 5년 내 갈아탈 상급지와의 현재 가격 갭, 그 갭이 벌어지는 추세인지.\n4. 학군·교통 등 '실거주 프리미엄'이 환금성으로도 연결되는 입지인가.\n5. 최소 6개월치 원리금 + 예비비 현금 버퍼 확보 여부."},{"label":"보유/매도 전략","body":"1주택 비과세(2년 보유, 조정지역은 2년 거주) 요건을 채워 매도. 갈아타기는 상급지 갭이 좁혀진 횡보·조정장을 노려라. 한 채 집중이므로 매도 타이밍이 곧 다음 사다리 칸을 결정 — 매년 상급지 갭을 점검하라."}],"M-SHRE":[{"label":"적합 물건","body":"무차입으로 매수 가능한 우량 입지의 실거주 한 채. 관리 편한 신축~준신축, 환금성 높은 평형."},{"label":"피해야 할 함정","body":"무차입 고집으로 우량 자산 상승분을 통째로 놓치는 '느린 손실'. 과도한 안전 추구로 합리적 갈아타기까지 회피. 현금을 비생산적으로 방치."},{"label":"매수 전 체크리스트","body":"1. 무차입 매수가 기회비용(같은 돈으로 적정 레버리지 시 추가 수익) 대비 합리적인가.\n2. 인플레이션 하에서 이 자산이 물가 상승률을 따라갈 우량 입지인가.\n3. 비상 현금은 남기되, 과도한 현금 방치(실질 구매력 손실)는 아닌가."},{"label":"보유/매도 전략","body":"장기 보유가 기본. 하락·고금리장에 현금 동원력으로 우량 급매를 줍는 역발상 매수를 준비. 갈아타기가 합리적인 국면에선 '적정' 레버리지를 거부하지 말 것."}],"M-SHPG":[{"label":"적합 물건","body":"전세가율 높고 전세수요 탄탄한 검증 입지(직주근접·학군). 갭(매매가-전세가)이 작고, 입주 물량 리스크 적은 지역."},{"label":"피해야 할 함정","body":"\"우량지니 전세는 늘 나간다\" 가정. 입주 폭탄·금리 급등기 역전세 무대비. 다주택 확장 중 취득세·종부세·양도세 중과 간과. 무주택자가 본인 실거주를 무한정 미룸."},{"label":"매수 전 체크리스트","body":"1. 향후 2~3년 해당 권역 입주(공급) 물량 — 역전세 가능성 점검.\n2. 전세가 10~20% 하락 시 반환 가능한 현금 버퍼 보유 여부.\n3. 전세 만기 캘린더와 재계약 시나리오.\n4. (다주택 진입 시) 취득세 중과·종부세 합산·양도세 중과 시뮬레이션.\n5. (무주택) 청약·실거주 비과세 기회를 포기할 만한 수익 우위가 있는가."},{"label":"보유/매도 전략","body":"장기 보유로 시세 상승 향유하되, 전세 만기마다 역전세 점검은 필수. 매도는 보유 2년+ 비과세/일반세율 구간에서. 역전세 국면이 닥치면 보증금 일부 반환을 위한 추가 대출 한도를 미리 확보."}],"M-SHPE":[{"label":"적합 물건","body":"자기자본으로 확보 가능한 우량 입지 물건. 현금흐름·환금성 안정적인 검증 자산."},{"label":"피해야 할 함정","body":"분석마비(검토만 하다 실행 못 함). 무차입 고집에 따른 자본 비효율로 장기 누적 수익 격차. 좋은 기회 앞에서도 매수 지연."},{"label":"매수 전 체크리스트","body":"1. 분석을 끝냈으면 정한 기준 충족 시 '실행'할 트리거를 미리 정했는가.\n2. 무차입의 안정 vs 적정 레버리지의 수익, 둘을 정량 비교했는가.\n3. 매수 지연으로 놓친 직전 기회들을 복기했는가."},{"label":"보유/매도 전략","body":"장기 보유·복리가 강점. 하락장 현금 동원으로 우량 급매 매수. 단, 좋은 물건엔 적정 레버리지를 검토해 실행 속도를 높여라."}],"M-STRG":[{"label":"적합 물건","body":"비과세 요건 채우기 좋은 검증 입지 실거주 물건, 상급지 환승 사다리."},{"label":"피해야 할 함정","body":"환승 거래비용(취득세·중개·이사) 누적, 처분기한 압박, 상급지가 더 빨리 올라 격차 확대."},{"label":"매수 전 체크리스트","body":"1) 일시적 2주택 비과세 처분기한·요건 확인 2) 매도·매수 동시 진행 자금 갭 3) 상급지와의 가격 격차 추세."},{"label":"보유/매도 전략","body":"비과세 타이밍에 환승, 상급지 갭이 좁아진 조정장을 노려라."}],"M-STRE":[{"label":"적합 물건","body":"무리 없는 자금의 검증 입지 실거주 물건."},{"label":"피해야 할 함정","body":"무한 연기로 상급지 격차 복리 확대, 과도한 신중함."},{"label":"매수 전 체크리스트","body":"1) 환승 미루는 동안의 기회비용 2) 무차입 제약으로 진입 못 하는 상급지 여부 3) 자금계획 보수성 점검."},{"label":"보유/매도 전략","body":"보수적 환승. 단, '준비되면'을 핑계로 한 무한 연기는 경계."}],"M-STPG":[{"label":"적합 물건","body":"환금성 높은 검증 물건, 단기 매각 수요 탄탄한 입지."},{"label":"피해야 할 함정","body":"단기 양도세(2년 미만 중과) 과소평가, 거래비용 누적, 안전물건의 박한 마진."},{"label":"매수 전 체크리스트","body":"1) 보유기간별 양도세율 적용한 세후 수익 2) 매각 출구 수요 검증 3) 전세 레버리지 역전세 리스크."},{"label":"보유/매도 전략","body":"세후 수익이 충분치 않으면 2년 보유로 전환해 일반세율/비과세 활용."}],"M-STPE":[{"label":"적합 물건","body":"무차입 가능한 안전 물건(단, 정체성 재점검 권장)."},{"label":"피해야 할 함정","body":"안전+단기차익의 본질적 상충 — 어느 쪽도 못 챙김. 자본 비효율."},{"label":"매수 전 체크리스트","body":"1) 세후 단기차익이 정말 남는가 2) 장기보유/레버리지 중 어느 정체성이 본인에 맞는가."},{"label":"보유/매도 전략","body":"단타 매력이 약하면 장기보유로 전환 검토."}],"M-AHRG":[{"label":"적합 물건","body":"정비사업·교통 개발 기대가 있는 실거주 가능 지역. 사업 단계가 가시화된 곳."},{"label":"피해야 할 함정","body":"거주지에 대한 감정 이입으로 호재 실현 확률·시점 낙관, 정비사업 장기화 중 생활 불편, 레버리지+불확실성 이중 부담."},{"label":"매수 전 체크리스트","body":"1) 정비사업 단계(조합설립/사업시행/관리처분)와 예상 기간 2) 호재 무산 시에도 거주 만족도가 유지되는가 3) 사업 지연 중 원리금 감당력."},{"label":"보유/매도 전략","body":"실거주 만족과 투자 기대를 분리. 호재 실현 단계마다 보유/매도 재판단."}],"M-AHRE":[{"label":"적합 물건","body":"저평가 실거주지, 무차입 매수 가능 가격대."},{"label":"피해야 할 함정","body":"무한 인내(호재가 안 올 수도), 자본 묶임, 다른 우량지 선상승 소외."},{"label":"매수 전 체크리스트","body":"1) 저평가를 해소할 카탈리스트 존재 2) 버티는 기간의 기회비용 3) 무차입 제약 점검."},{"label":"보유/매도 전략","body":"카탈리스트 점검하며 장기 보유. 촉매 없으면 출구 재검토."}],"M-AHPG":[{"label":"적합 물건","body":"사업성 검증된 정비사업 구역(재건축·재개발), 단계별로 리스크-수익 프로파일이 다름 — 본인 리스크 수용도에 맞는 단계 선택. 전세·대출 레버리지 가능 가격대."},{"label":"피해야 할 함정","body":"상승 시나리오만 정교하게 그리고 시간비용·무산리스크 할인. '호재'를 단계 구분 없이 뭉뚱그림. 분담금 추가 납입 무대비. 사업단계 중 환금성 제로 간과."},{"label":"매수 전 체크리스트","body":"1. 사업 단계 확인: 구역지정 → 조합설립인가 → 사업시행인가 → 관리처분인가. 빠른 단계일수록 수익↑·무산 확률↑.\n2. 추정 분담금과 추가 분담금 발생 시 감당 가능 현금.\n3. 조합 내분·소송 이력, 비대위 유무 등 사업 추진 안정성.\n4. 같은 자금을 검증 우량지에 넣었을 때의 기회비용 대비 기대수익.\n5. 사업 기간(평균 10년+) 동안 자금 동결을 감당할 수 있는가."},{"label":"보유/매도 전략","body":"단계 진행에 따라 가치가 점프(인가 시점마다 상승)하므로, 인가 이벤트 전 매집·후 차익 실현 전략 가능. 무산 시그널(조합 해산·장기 정체) 포착 시 손절 기준을 미리 정하라. 다주택 진입 시 정비사업 조합원 양도 제한·세금 확인."}],"M-AHPE":[{"label":"적합 물건","body":"카탈리스트 있는 저평가 물건, 무차입 매수 가능 가격대."},{"label":"피해야 할 함정","body":"\"싸니까 안전\" — 싼 이유 간과, 촉매 없는 영구 저평가, 자본 묶임."},{"label":"매수 전 체크리스트","body":"1) 가격을 올릴 구체적 촉매 2) 저평가 지속 시 버티는 기간 3) 무차입 기회비용."},{"label":"보유/매도 전략","body":"촉매 실현 시 매도. 촉매 부재면 진입 자체를 보류."}],"M-ATRG":[{"label":"적합 물건","body":"호재 지역의 실거주 환승 대상, 빠른 상승 흐름 물건."},{"label":"피해야 할 함정","body":"실거주 명분 뒤의 고위험 단타, 거래비용+단기 양도세, 타이밍 실패 시 큰 손실."},{"label":"매수 전 체크리스트","body":"1) 환승 시 시장·세금·자금 동시 정렬 여부 2) 단기 양도세 세후 수익 3) 타이밍 역행 시 버티기 시나리오."},{"label":"보유/매도 전략","body":"강한 상승장 한정. 한 박자 어긋나면 보수 모드로 전환."}],"M-ATRE":[{"label":"적합 물건","body":"무차입 가능한 공격 실거주 환승 물건(정체성 재점검 권장)."},{"label":"피해야 할 함정","body":"현금 동원력 과신으로 변동성 경시, 단타 양도세, 자본 비효율."},{"label":"매수 전 체크리스트","body":"1) 무차입인데 굳이 단기 공격하는 이유 2) 세후 수익 3) 본인 성향 재확인."},{"label":"보유/매도 전략","body":"변동성 큰 상승장 한정. 장기보유 전환도 검토."}],"M-ATPG":[{"label":"적합 물건","body":"저평가·호재 물건 중 단기 모멘텀이 강한 것. 전세·대출 풀레버리지 가능 + 환금성(거래 활발) 검증된 물건. 거래량 받쳐주는 상승장 한정."},{"label":"피해야 할 함정","body":"몇 번 성공 후 '시장을 읽는다'는 과신. 환금성 함정(팔아야 할 때 못 팖)에서 풀레버리지가 마진콜로 돌변. 세전 수익에 취해 단기 양도세 무시."},{"label":"매수 전 체크리스트","body":"1. 청산(매도) 시나리오: 누구에게, 얼마에, 며칠 안에 파는가 — 출구가 먼저다.\n2. 거래가 멈춰 '못 팔았을 때'의 자금/이자 시나리오(강제 장기보유 대비).\n3. 단기 양도세율 적용한 세후 수익 — 세전 수익은 의미 없다.\n4. 금리·역전세 동시 충격 시 레버리지 감당 한계.\n5. 풀레버리지 비중 상한선을 본인 자본 대비 못 박았는가."},{"label":"보유/매도 전략","body":"진입 시 청산 조건(목표가·손절가·기한)을 동시에 확정. 거래량·심리 둔화 시그널에 즉시 청산. 세후로만 성과 측정. 한 사이클 실패가 다음 사이클을 막지 않도록 레버리지에 상한을 둘 것."}],"M-ATPE":[{"label":"적합 물건","body":"무차입 가능 저평가 물건(정체성 재점검 권장)."},{"label":"피해야 할 함정","body":"무차입=안전 착각(진짜 비용은 세금·타이밍), 자본 비효율."},{"label":"매수 전 체크리스트","body":"1) 세후 단기차익 2) 무차입으로 수익 잠재력 깎는 게 맞는가 3) 장기보유/레버리지 회전 중 정체성 확정."},{"label":"보유/매도 전략","body":"정체성을 M-AHPE(장기) 또는 M-ATPG(레버리지 회전)로 명확히.\n\n---\n\n# 경매(競賣) 트랙 활용 가이드\n\n> **개인화 경고 공통 골격** (모든 경매 유형에 적용, 유형별로 강조점 다름):\n> - **주택보유상황** — 다주택: 낙찰도 취득이므로 취득세 중과(조정지역 2주택~ 8~12%)·종부세 합산·단기 매각 시 양도세 중과. / 1주택: 일시적 2주택 비과세 처분기한 활용. / 무주택: 실거주 의무·대출 우대(생애최초·디딤돌)·청약 기회와 저울질.\n> - **경매경험** — 초보: 특수물건(유치권·지분·법정지상권) 금지에 가깝게, 고가낙찰(경쟁에 휩쓸려 시세 이상 입찰) 경고. / 중급: 권리분석 1~2개 쟁점 물건까지. / 숙련: 특수물건 도전 가능."}],"A-scnr":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 권리 단순 물건(말소기준권리 이하 전부 소멸, 인수 권리 없음)만. **안전입찰 위주** — 권리분석 난이도 최저로 유지. 실거주·실수요용 아파트·빌라."},{"label":"명도 리스크 수용","body":"낮게. 점유자 협의 명도가 기본이되, 인도명령 가능 물건(대항력 없는 점유)으로 한정."},{"label":"입찰 전 체크리스트","body":"1. 등기부·매각물건명세서·현황조사서 3종으로 인수 권리 0 확인.\n2. 최근 실거래·급매가에서 '거꾸로' 입찰 상한선 산정 → 넘으면 포기.\n3. 점유자 현황(소유자/임차인/대항력)과 인도명령 가능 여부.\n4. 명도비·이사비·체납관리비 등 부대비용 반영한 총취득원가."},{"label":"개인화 경고","body":"- **초보(최빈):** 당신의 위험은 권리가 아니라 **고가낙찰**이다. \"경매로 샀다\"에 취하지 말고 시세 기반 상한선을 절대 넘지 마라. 안전물건이라 경쟁 심함 — 패찰을 두려워 말 것.\n- **무주택:** 실거주 시 대출 우대(생애최초·디딤돌)·비과세 활용. 실거주 의무·기간 확인.\n- **다주택:** 취득세 중과로 '싸게 낙찰'의 메리트가 상쇄될 수 있음 — 세후 취득원가로 재계산."}],"A-scnf":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 권리 단순 물건. **안전입찰 위주.** 수리 후 가치 상승 여지 있는 구축·급매성 물건."},{"label":"명도 리스크 수용","body":"낮게. 빠른 명도(인도명령 가능)가 회전의 전제 — 명도 분쟁 소지 물건 회피."},{"label":"입찰 전 체크리스트","body":"1. 매입가 + 수리비 + 명도비 + 세금 + 중개비 → '세후·비용후' 매각 차익 계산.\n2. 매각 출구: 그 지역 실수요 매수층과 최근 매각 소요기간 검증.\n3. 보유기간별 양도세율 — 단기일수록 중과, 세후 수익 확정.\n4. 명도·수리 지연 시 회전 전제가 깨질 자금 시나리오."},{"label":"개인화 경고","body":"- **다주택:** **단기 양도세 중과**가 핵심 — 보유 1년 미만 70%, 2년 미만 60%(+지방세). 세후 남는 게 거의 없을 수 있다. 취득세 중과까지 겹침.\n- **무주택/1주택:** 단타라도 비과세 요건(2년 보유) 채우면 세금 급감 — 회전 속도와 세금 절감을 저울질.\n- **초보:** 스프레드만 보지 말고 비용 전부를 빼고도 남는지 보수적으로 확인."}],"A-scwr":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 안전(권리 단순) 임대수익형. **안전입찰 위주.**"},{"label":"명도 리스크 수용","body":"낮게(원격이라 분쟁 시 대응 어려움)."},{"label":"입찰 전 체크리스트","body":"1) 현지 임차수요·공실률·표면이율의 실질 검증 2) 원격 관리 체계(관리업체·현지 인맥) 3) 권리 단순 확인 4) 환금성(매각 출구)."},{"label":"개인화 경고","body":"다주택 시 종부세 합산·취득세 중과 누적 점검. 원격 관리 비용을 수익률에서 차감. 초보는 연고지부터 시작 권장."}],"A-scwf":[{"label":"적합 물건 · 권리분석 난이도","body":"전국에서 발굴한 권리 단순 저평가 물건. **안전입찰 위주**(난이도는 낮게 유지하되 지역만 넓힘)."},{"label":"명도 리스크 수용","body":"낮~중. 원격이라 명도 분쟁은 비용·시간 폭증 — 인도명령 가능 물건 한정."},{"label":"입찰 전 체크리스트","body":"1. **출구 검증이 최우선:** 그 지역 최근 매각 소요기간·실수요 매수층 확인. 낙찰 쉬워도 매각 어려우면 단타 붕괴.\n2. 원정 비용(교통·임장·명도 출장)을 마진에서 차감한 실수익.\n3. 단기 양도세율 반영한 세후 수익.\n4. 동시 진행 건수 상한 — 명도·매각 겹침 capacity 초과 방지."},{"label":"개인화 경고","body":"- **다주택:** 단기 양도세 중과 + 취득세 중과로 원정·세금 이중 비용 — 세후로 냉정히.\n- **초보:** 낯선 지역 + 단기는 출구 리스크가 가장 큼. 연고지(A-scnf)로 경험 쌓은 뒤 확장 권장. 고가낙찰 + 출구 막힘 동시 발생 주의."}],"A-sxnr":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 특수물건(지분·소액 유치권 등) 보유 목적. **특수물건 — 중급 이상 권장.** 단, 소액과 특수의 자금 충돌 주의."},{"label":"명도 리스크 수용","body":"중~높음. 소송·협상 동반 가능."},{"label":"입찰 전 체크리스트","body":"1) 권리 해결 시나리오·기간·비용(소송비·합의금) 예비비 2) 소액으로 버퍼 충분한지 3) 연고지 정보 우위가 권리분석을 대체 못함 — 권리 자체 분석."},{"label":"개인화 경고","body":"초보는 진입 금지에 가깝게. 특수물건 해결 예비비 없이 소액 진입 위험. 다주택 보유 전환 시 세금 확인."}],"A-sxnf":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 특수물건 단기 차익. **특수물건 — 중급~숙련.** 고위험."},{"label":"명도 리스크 수용","body":"높음."},{"label":"입찰 전 체크리스트","body":"1) 권리 해결 기간이 '단기'로 끝날 근거 2) 협상·소송 장기화 시 소액 자금 묶임 대비 3) 경험·역량 자기평가."},{"label":"개인화 경고","body":"초보 금지. 특수물건 + 단기 전제는 자주 깨짐 — 강제 장기화 대비. 다주택 단기 양도세 중과."}],"A-sxwr":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 특수물건 보유. **특수물건 — 숙련 + 현지 네트워크 전제.** 권장도 낮음."},{"label":"명도 리스크 수용","body":"높음(원격이라 더 어려움)."},{"label":"입찰 전 체크리스트","body":"1) 자금·난이도·거리 삼중 부담 감당 자원 2) 원격 소송·명도 처리 체계 3) 최악 시나리오 비용."},{"label":"개인화 경고","body":"초보·중급 비권장. 한 축(자금·난이도·거리) 조정 권고. 다주택 세금."}],"A-sxwf":[{"label":"적합 물건 · 권리분석 난이도","body":"(권장 불가) 소액·전국·특수·단기 — 네 악조건 최악 조합."},{"label":"명도 리스크 수용","body":"(감당 불가에 가까움)"},{"label":"입찰 전 체크리스트","body":"진입 전 **최소 한 축을 조정하라** — 자금 키우기(b)·난이도 낮추기(c)·연고지로 좁히기(n) 중 하나."},{"label":"개인화 경고","body":"**초보 절대 금지.** 이 성향이 나왔다면 과욕 신호다. 특수물건은 빨리 못 팔고, 원격이라 대응 못 하고, 소액이라 소송비가 없다 — 네 위험이 동시에 터지면 자금 전체 손실. A-bxwf 전문가의 멘토링 없이는 진입 불가."}],"A-bcnr":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 우량 안전물건(권리 단순), 실거주·장기보유. **안전입찰 위주** — 대액이지만 난이도는 낮게."},{"label":"명도 리스크 수용","body":"낮게. 인도명령 가능·점유 단순 물건."},{"label":"입찰 전 체크리스트","body":"1. 시세 기반 입찰 상한선 — 자금 여유로 '이 정도면 써도 된다'며 끌어올리지 말 것.\n2. 우량·안전은 경쟁 치열 → 낙찰가율 점검, 메리트 없으면 일반 매매와 비교.\n3. 대액 집중이므로 한 번의 고가낙찰 = 큰 손실. 권리분석·시세조사를 본인이 직접.\n4. 명도 시나리오·부대비용."},{"label":"개인화 경고","body":"- **무주택:** 실거주 대출 우대·비과세 활용, 실거주 의무 확인.\n- **1주택:** 일시적 2주택 비과세 처분기한.\n- **다주택:** 취득세 중과(대액일수록 절대액 큼)·종부세 합산 — 세후 취득원가 재계산."}],"A-bcnf":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 우량 안전물건 단기 매각. **안전입찰 위주.**"},{"label":"명도 리스크 수용","body":"낮~중(빠른 명도 필요)."},{"label":"입찰 전 체크리스트","body":"1) 대액을 마진 박한 안전 단타에 쓰는 자본효율 점검(집중·특수·보유가 나을 수도) 2) 단기 양도세 절대액 3) 매각 출구."},{"label":"개인화 경고","body":"다주택 단기 양도세 중과로 대액일수록 세부담 거대. 보유 전환 검토."}],"A-bcwr":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 우량 안전 임대물건 분산 보유. **안전입찰 위주.**"},{"label":"명도 리스크 수용","body":"낮게."},{"label":"입찰 전 체크리스트","body":"1) 현지 관리 인프라 2) 분산 관리 capacity 3) 권리 단순 확인 4) 표면이율의 실질 검증."},{"label":"개인화 경고","body":"다주택 종부세 합산이 분산 보유에서 누적 — 보유세 시뮬레이션. 원격 관리 비용 차감."}],"A-bcwf":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 우량 안전 단기매각. **안전입찰 위주.** (자본효율 의심)"},{"label":"명도 리스크 수용","body":"낮~중."},{"label":"입찰 전 체크리스트","body":"1) **대액인데 박리다매 전략 — 집중·특수·보유로 전환이 합리적이지 않은지 재검토** 2) 원격 출구 3) 단기 양도세."},{"label":"개인화 경고","body":"다주택 단기 양도세 + 원정 비용 이중고. 자본효율 우선 재설계 권고."}],"A-bxnr":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 특수물건 장기 보유·임대. **특수물건 — 중급~숙련.**"},{"label":"명도 리스크 수용","body":"중~높음."},{"label":"입찰 전 체크리스트","body":"1) 권리 해결 시나리오·기간·비용(자금 버퍼 충분) 2) 보유 전환까지 명도·정상화 기간 3) 상대(공유자·유치권자) 비합리 대응 시 교착 대비."},{"label":"개인화 경고","body":"다주택 보유세·취득세. 중급 이상 권장, 초보는 안전물건부터."}],"A-bxnf":[{"label":"적합 물건 · 권리분석 난이도","body":"연고지 특수물건(유치권·지분·법정지상권 등) 단기 수익. **특수물건 — 숙련 권장.** 권리분석·소송·명도 역량 필수."},{"label":"명도 리스크 수용","body":"높음. 자금 버퍼로 합의금·소송 감당 가능한 범위."},{"label":"입찰 전 체크리스트","body":"1. **최악 시나리오 기준 입찰가:** 상대가 비합리적으로 버텨 소송이 예상의 2배 길어져도 수익이 나는가.\n2. 권리 해결 총비용(소송비·합의금·명도비) + 기간 → 자본 묶임 비용.\n3. 연고지 매각 출구(권리 정상화 후 실수요·매수층).\n4. 동시 진행 건수 제한 — 분쟁 관리 capacity 초과 방지."},{"label":"개인화 경고","body":"- **숙련 전제 유형** — 중급 이하는 1~2쟁점 물건으로 제한, 초보는 비권장.\n- **다주택:** 단기 수익 시 양도세 중과 + 취득세 중과 — 세후 마진으로 입찰가 설계.\n- 자본력이 조급함을 부추겨 과한 합의금/과소 난이도 평가 양극단 주의."}],"A-bxwr":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 특수물건 장기 보유. **특수물건 — 숙련/전업 + 현지 네트워크.**"},{"label":"명도 리스크 수용","body":"높음(원격)."},{"label":"입찰 전 체크리스트","body":"1) 원격 소송·명도·임장 처리 체계 2) 보유 정상화까지 기간·비용 3) 자금 장기 동결 감당."},{"label":"개인화 경고","body":"다주택 보유세 누적. 전업 수준 역량 전제 — 그 이하 비권장."}],"A-bxwf":[{"label":"적합 물건 · 권리분석 난이도","body":"전국 특수물건(최고 난도) 단기 수익. **특수물건 — 전업/숙련 전용.** 권리분석·소송·명도·세무·현지 네트워크 시스템 필수."},{"label":"명도 리스크 수용","body":"최고. 단, 시스템·예비비로 통제 가능한 범위."},{"label":"입찰 전 체크리스트","body":"1. 지역·법원별 관행 차이 확인 — 과거 성공 패턴을 그대로 대입하지 말 것.\n2. 각 건의 최악 시나리오(소송 패소·명도 장기화) 자금을 **따로 적립**한 상태에서만 신규 입찰.\n3. 동시 진행 건수 상한 — 한 건의 교착이 전체 현금흐름을 막는 연쇄 위험 차단.\n4. 다건·대액 단기 수익의 **단기 양도세 부담**을 세후로 설계."},{"label":"개인화 경고","body":"- **전업·숙련 전용** — 초보·중급 진입 시 가장 위험한 영역.\n- **다주택(거의 필연):** 단기 양도세 중과 절대액이 거대 — 법인 활용·보유기간 조정 등 세무 설계 동반 필수.\n- '특수만 고집'하는 비효율 경계 — 쉬운 수익(안전물건)도 선택지에 둘 것."}]};
const SCORE_FN = function scoreTrack(data, answers, profileAnswers) {
  var tally = {};
  function add(scoreObj) {
    if (!scoreObj) return;
    for (var k in scoreObj) tally[k] = (tally[k] || 0) + scoreObj[k];
  }
  // general questions
  for (var i = 0; i < data.questions.length; i++) {
    var q = data.questions[i];
    var opt = answers[q.id];
    if (opt) add(opt.score);
  }
  // profile inputs (axis-bearing add score; all store value)
  var profileValues = {};
  var pin = data.profile_inputs || [];
  for (var j = 0; j < pin.length; j++) {
    var inp = pin[j];
    var sel = profileAnswers ? profileAnswers[inp.id] : null;
    if (sel) {
      profileValues[inp.id] = sel.value;
      if (sel.score) add(sel.score);
    }
  }
  // resolve poles per axis_order
  var poles = {};
  var borderline = [];
  for (var a = 0; a < data.axis_order.length; a++) {
    var axisId = data.axis_order[a];
    var ax = null;
    for (var z = 0; z < data.axes.length; z++) if (data.axes[z].id === axisId) ax = data.axes[z];
    var sa = tally[ax.pole_a.code] || 0;
    var sb = tally[ax.pole_b.code] || 0;
    if (sa > sb) poles[axisId] = ax.pole_a.code;
    else if (sb > sa) poles[axisId] = ax.pole_b.code;
    else { poles[axisId] = ax.default_pole; borderline.push(axisId); }
  }
  // assemble code
  var code = data.code_prefix;
  for (var b = 0; b < data.axis_order.length; b++) code += poles[data.axis_order[b]];
  // flags
  var flags = [];
  var rules = data.flags || [];
  for (var r = 0; r < rules.length; r++) {
    var rule = rules[r], when = rule.when, ok = true;
    for (var key in when) {
      var want = when[key], got;
      if (key.indexOf('axis_') === 0) got = poles[key.slice(5)];
      else if (key === 'type_code') got = code;
      else got = profileValues[key];
      if (got !== want) { ok = false; break; }
    }
    if (ok) flags.push({ level: rule.level, message: rule.message });
  }
  var lvOrder = { danger: 0, warn: 1, info: 2 };
  flags.sort(function (x, y) { return lvOrder[x.level] - lvOrder[y.level]; });
  return { code: code, poles: poles, borderline: borderline, flags: flags, profileValues: profileValues, tally: tally };
};
const scoreTrack = SCORE_FN;

/* ---------- mini markdown formatter ---------- */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineFmt(s){ return esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }
function fmt(raw){
  if(!raw) return '';
  // split inline enumerations "1) .. 2) .." into separate lines
  let lines = raw.split('\n');
  let expanded = [];
  for(let line of lines){
    let trimmed = line.trim();
    let parens = (trimmed.match(/\d+\)\s/g)||[]).length;
    if(parens>=2 && trimmed.indexOf('- ')!==0){
      trimmed.split(/\s*(?=\d+\)\s)/).forEach(p=>{ if(p.trim()) expanded.push(p.trim()); });
    } else if(trimmed) expanded.push(trimmed);
  }
  let html='', i=0;
  while(i<expanded.length){
    let l=expanded[i];
    if(/^-\s/.test(l)){
      html+='<ul>';
      while(i<expanded.length && /^-\s/.test(expanded[i])){ html+='<li>'+inlineFmt(expanded[i].replace(/^-\s/,''))+'</li>'; i++; }
      html+='</ul>';
    } else if(/^\d+[\.\)]\s/.test(l)){
      html+='<ol>';
      while(i<expanded.length && /^\d+[\.\)]\s/.test(expanded[i])){ html+='<li>'+inlineFmt(expanded[i].replace(/^\d+[\.\)]\s/,''))+'</li>'; i++; }
      html+='</ol>';
    } else { html+='<p>'+inlineFmt(l)+'</p>'; i++; }
  }
  return html;
}

/* ---------- quiz ---------- */
function beginQuiz(){
  const data=DATA[state.track];
  let steps=[];
  // v1.1: 매매·경매 양 트랙 모두 profile_inputs(주택보유·규제지역 등)를 먼저 입력
  (data.profile_inputs||[]).forEach(p=>steps.push({kind:'profile',item:p}));
  data.questions.forEach(q=>steps.push({kind:'question',item:q}));
  state.steps=steps; state.stepIndex=0; state.answers={}; state.profile={};
  show('screen-quiz'); renderStep();
}
function renderStep(){
  const data=DATA[state.track];
  const step=state.steps[state.stepIndex];
  const total=state.steps.length;
  $('q-track').textContent=data.track_label;
  $('q-count').textContent=(state.stepIndex+1)+' / '+total;
  $('q-bar').style.width=(((state.stepIndex)/(total))*100)+'%';
  const body=$('q-body');
  const it=step.item;
  const isProfile=step.kind==='profile';
  const selected = isProfile ? state.profile[it.id] : state.answers[it.id];
  let h='<div class="qkind"><span class="dot'+(isProfile?' profile':'')+'"></span><span>'+
        (isProfile?('내 조건 입력 · '+it.label):('성향 질문 · '+axisLabel(data,it.axis)))+'</span></div>';
  h+='<div class="qtext">'+esc(it.text)+'</div>';
  h+='<div class="qsub">'+(isProfile?'더 정확한 결과를 위해 필요한 기본 조건이에요.':'정답은 없어요. 더 마음이 가는 쪽을 고르세요.')+'</div>';
  h+=termHelpV2(it, isProfile);
  h+='<div class="opts">';
  it.options.forEach((o,idx)=>{
    const sel = selected && selected.__i===idx;
    h+='<button class="opt'+(sel?' sel':'')+'" data-idx="'+idx+'"><span class="mark"></span><span>'+esc(o.label)+'</span></button>';
  });
  h+='</div>';
  body.innerHTML=h;
  body.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick=()=>{
      const idx=+btn.dataset.idx;
      const opt=Object.assign({__i:idx}, it.options[idx]);
      if(isProfile) state.profile[it.id]=opt; else state.answers[it.id]=opt;
      body.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
      btn.classList.add('sel');
      $('next-btn').disabled=false;
    };
  });
  $('prev-btn').style.visibility = state.stepIndex===0 ? 'hidden':'visible';
  const isLast = state.stepIndex===total-1;
  $('next-btn').textContent = isLast ? '결과 보기 ✦' : '다음 →';
  $('next-btn').disabled = !selected;
}

  const text = [it.text].concat((it.options||[]).map(o=>o.label)).join(' ');
  const sourceTerms = [
    {key:'권리분석', match:['권리','법적'], desc:'이 집에 얽힌 빚, 세입자, 법적 문제를 입찰 전에 확인하는 일이에요.'},
    {key:'경매', match:['경매'], desc:'법원에서 나온 물건을 정해진 날짜에 가격을 써내고 사는 방식이에요.'},
    {key:'낙찰', match:['낙찰'], desc:'입찰한 사람 중 조건이 맞아 최종으로 사게 되는 것을 말해요.'},
    {key:'입찰', match:['입찰'], desc:'내가 이 물건을 얼마에 사고 싶은지 가격을 적어 내는 일이에요.'},

    {key:'명도', match:['명도'], desc:'낙찰받은 뒤 기존에 살던 사람과 집을 비우는 문제를 정리하는 일이에요.'},
    {key:'규제', match:['규제'], desc:'정부가 대출, 세금, 거래 조건을 더 엄격하게 정해둔 상태예요.'},
    {key:'대출', match:['대출'], desc:'은행에서 돈을 빌려 집을 사는 방식이에요.'},
    {key:'전세', match:['전세'], desc:'세입자가 큰 보증금을 맡기고 월세 없이 사는 한국식 임대 방식이에요.'},
    {key:'세입자', match:['세입자'], desc:'그 집에 돈을 내고 살고 있는 사람이에요.'},
    {key:'시세', match:['시세'], desc:'요즘 비슷한 집이 실제로 거래되는 가격 수준이에요.'}
  ];
  let list = sourceTerms.filter(t=>t.match.some(k=>text.indexOf(k)!==-1));
  if(!list.length && !isProfile) return '';
  if(!list.length) list = [{key:'내 조건', desc:'집 보유 여부, 쓸 수 있는 돈, 관심 지역처럼 결과를 더 현실적으로 만들기 위한 정보예요.'}];

    list.map(t=>'<p><b>'+esc(t.key)+'</b>: '+esc(t.desc)+'</p>').join('')+
    '</div></details>';

function hasBatchim(word){
  const ch = String(word).trim().slice(-1);
  const code = ch.charCodeAt(0);
  if(code < 0xAC00 || code > 0xD7A3) return false;
  return ((code - 0xAC00) % 28) !== 0;
}
function koreanTopicTitle(label){
  const last = String(label).split(' · ').pop();
  return label + (hasBatchim(last) ? '이란?' : '란?');
}

function friendlyTypeName(code, fallback){
  const map={
    'A-scnr':'가까운 쉬운 물건부터 보는 보유형',
    'A-scnf':'가까운 쉬운 물건을 빠르게 정리하는 형',
    'A-scwr':'먼 지역의 쉬운 물건도 보는 보유형',
    'A-scwf':'먼 지역의 쉬운 물건을 빠르게 정리하는 형',
    'A-sxnr':'가까운 복잡한 물건도 공부하는 보유형',
    'A-sxnf':'가까운 복잡한 물건을 빠르게 정리하는 형',
    'A-sxwr':'먼 지역의 복잡한 물건도 보는 보유형',
    'A-sxwf':'먼 지역의 복잡한 물건을 빠르게 정리하려는 고난도형',
    'A-bcnr':'큰돈으로 가까운 쉬운 물건을 보는 보유형',
    'A-bcnf':'큰돈으로 가까운 쉬운 물건을 빠르게 정리하는 형',
    'A-bcwr':'큰돈으로 먼 지역의 쉬운 물건도 보는 보유형',
    'A-bcwf':'큰돈으로 먼 지역의 쉬운 물건을 빠르게 정리하는 형',
    'A-bxnr':'큰돈으로 가까운 복잡한 물건도 보는 보유형',
    'A-bxnf':'큰돈으로 가까운 복잡한 물건을 빠르게 정리하는 형',
    'A-bxwr':'큰돈으로 먼 지역의 복잡한 물건도 보는 보유형',
    'A-bxwf':'큰돈으로 먼 지역의 복잡한 물건을 빠르게 정리하는 전문가형',
  };
  return map[code] || fallback;
}

function typeNameByCode(code){
  for(const trackKey of Object.keys(DATA)){
    const found = (DATA[trackKey].types||[]).find(t=>t.code===code);
    if(found) return friendlyTypeName(code, found.name);
  }
  return '';
}

function expandTypeCodes(text){
  return String(text||'').replace(/\b([MA]-[A-Za-z0-9]{4})\b(\(([^)]*)\))?/g, (full, code, _paren, note)=>{
    const name = typeNameByCode(code);
    if(!name) return full;
    if(note) return code+'('+name+', '+note+')';
    return code+'('+name+')';
  });
}

function fmtPartner(text){
  return fmt(expandTypeCodes(text));
}

function axisLabel(data,axisId){ const a=data.axes.find(x=>x.id===axisId); return a?a.label:axisId; }
$('prev-btn').onclick=()=>{ if(state.stepIndex>0){ state.stepIndex--; renderStep(); } };
$('next-btn').onclick=()=>{
  if(state.stepIndex<state.steps.length-1){ state.stepIndex++; renderStep(); $('q-bar').style.width=((state.stepIndex/state.steps.length)*100)+'%'; }
  else finishQuiz();
};
function finishQuiz(){
  const data=DATA[state.track];
  const profileAns={};
  for(const k in state.profile) profileAns[k]=state.profile[k];
  const r=scoreTrack(data, state.answers, profileAns);
  renderResult(state.track, r);
  saveToURL(state.track, r);
  show('screen-result');
}

function partnerHelp(raw){
  if(!raw) return '';
  const codes = [...new Set(String(raw).match(/\b[MA]-[A-Za-z0-9]{4}\b/g) || [])];
  const helpers = codes.map(code=>{
    if(code[0]==='A'){
      const axis = code.slice(2);
      const isBig = axis[0]==='b';
      const isSpecial = axis[1]==='x';
      const isWide = axis[2]==='w';
      const isFlip = axis[3]==='f';
      if(code==='A-bxnf'){
        return {code, title:'특수물건·협상 감각이 강한 사람', body:'복잡한 권리, 지분, 유치권처럼 초보가 놓치기 쉬운 쟁점을 먼저 짚어줄 수 있어요. 특히 입찰 전에 “이 리스크를 돈으로 해결할 수 있는지”, “협상 비용을 수익률에 넣었는지”를 같이 봐달라고 하면 좋습니다.'};
      }
      if(code==='A-scnf'){
        return {code, title:'출구·매각 감각이 좋은 사람', body:'싸게 사는 것보다 더 중요한 “팔 수 있는가”를 봐줄 수 있어요. 낙찰 후 되팔 때 걸리는 시간, 매수자가 좋아할 조건, 너무 싸 보여도 안 팔릴 물건을 걸러내는 관점을 도움받으면 좋습니다.'};
      }
      if(code==='A-bcnr'){
        return {code, title:'큰돈으로 가까운 쉬운 물건을 보는 보유형', body:'자금 여유가 있을 때도 “좋은 물건을 너무 비싸게 낙찰받지 않는 기준”을 배울 수 있어요. 입찰 상한선, 실거래가 비교, 보유했을 때의 안정성을 같이 보면 무리한 고가낙찰을 줄이는 데 도움이 됩니다.'};
      }
      const title = [
        isBig ? '큰돈을 다루는 자금 기준' : '소액으로 시작하는 기준',
        isSpecial ? '복잡한 물건 판단' : '쉬운 물건 선별',
        isWide ? '먼 지역 검토' : '가까운 지역 감각',
        isFlip ? '빠른 매각 출구' : '보유 안정성'
      ].join(' · ');
      const body = [
        isBig ? '큰 금액이 들어가는 만큼 입찰가 상한, 대출 가능 금액, 세후 수익을 보수적으로 잡는 법을 도움받으면 좋아요.' : '처음 시작할 때 필요한 최소 자금, 예비비, 잃어도 버틸 수 있는 범위를 같이 점검받으면 좋아요.',
        isSpecial ? '권리나 명도처럼 복잡한 부분에서 “싸 보이는 이유”를 먼저 확인해줄 수 있는 사람입니다.' : '초보가 보기 쉬운 물건과 경쟁이 몰려 비싸지는 물건을 구분하는 관점을 줄 수 있습니다.',
        isWide ? '낯선 지역의 시세, 수요, 매각 속도를 현지 관점으로 한 번 더 확인해줄 수 있어요.' : '내가 아는 동네라는 확신이 과신이 되지 않도록 실거래가와 호가를 같이 검증해줄 수 있어요.',
        isFlip ? '낙찰 후 팔 수 있는 가격과 기간, 수리비와 세금을 빼고도 남는지 보는 데 강점이 있습니다.' : '장기 보유했을 때 임대, 관리, 환금성까지 무리 없는지 보는 데 도움됩니다.'
      ].join(' ');
      return {code, title, body};
    }
    return {code, title:typeNameByCode(code) || '다른 투자 관점을 가진 사람', body:'내 결과와 다른 기준으로 물건을 보는 사람이어서, 내가 놓치기 쉬운 자금 계획·속도·리스크 기준을 한 번 더 점검받기 좋습니다.'};
  });
  if(!helpers.length) return '';
  return '<div class="partner-help">'+helpers.map(h=>
    '<div class="partner-help-item"><b>'+esc(h.code)+' · '+esc(h.title)+'</b><p>'+esc(h.body)+'</p></div>'
  ).join('')+'</div>';
}

    '<p class="flag-foot">※ 쉬운 요약용 안내입니다. 실제 매수·입찰 전에는 금융기관, 세무사, 법무사에게 현재 기준으로 다시 확인하세요.</p>'+
    '</div></details></div>';
}
